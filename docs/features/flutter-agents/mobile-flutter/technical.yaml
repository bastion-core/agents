# =============================================================================
# APP INITIALIZATION SEQUENCE
# =============================================================================
app_initialization:
  sequence:
    - step: "WidgetsFlutterBinding.ensureInitialized()"
    - step: "Set portrait orientation only"
    - step: "Detect device locale and initialize date formatting"
    - step: "Load .env file (with fallback to .env.example)"
    - step: "Configure environment from APP_ENV variable"
    - step: "Initialize Firebase"
    - step: "Setup dependency injection (setupDependencies())"
    - step: "Configure Crashlytics and global error handlers"
    - step: "Configure logging"
    - step: "Load remote config from Firestore (non-blocking)"
    - step: "runApp(MyApp(deviceLocale: deviceLocale))"
  error_handling: "runZonedGuarded wraps everything, fatal errors sent to Crashlytics"

# =============================================================================
# GLOBAL BLoC PROVIDERS
# =============================================================================
global_blocs:
  description: "BLoCs that are provided at the app root level via MultiBlocProvider"
  blocs:
    - name: "ChargingSessionBloc"
      scope: "Global (persists across all screens)"
      reason: "Charging session state must survive navigation"
      provision: "BlocProvider.value(value: getIt<ChargingSessionBloc>())"

    - name: "ConnectivityBloc"
      scope: "Global (monitors connectivity app-wide)"
      reason: "Connectivity monitoring runs continuously"
      provision: "BlocProvider(create: (_) => getIt<ConnectivityBloc>()..add(startMonitoring))"

  local_blocs:
    description: >
      Feature-specific BLoCs are provided locally in their respective screens
      using BlocProvider(create: (_) => getIt<{Feature}Bloc>()). They are NOT
      provided globally.
    rule: "Only provide BLoCs globally if their state must persist across navigation."
