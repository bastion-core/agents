depends_on: [03_implement_architecture_patterns, 05_implement_domain_layer_dtos, 09_implement_state_management_bloc, 13_implement_ui_components]
assigned_subagent: flutter-development:mobile-flutter

scope: |
  Agregar la seccion de Anti-Patterns al agente mobile-flutter.md.
  Cubrir la seccion anti_patterns del technical.yaml que define 14 patrones
  EXPLICITAMENTE PROHIBIDOS en el proyecto. Cada anti-patron debe incluir:
  - El patron prohibido
  - La razon por la que esta prohibido
  - La alternativa correcta que se debe usar

  Lista completa de anti-patrones:
  1. Separate Entity layer -> Usar DTOs Freezed en domain/dtos/
  2. Mapper classes -> Poner fromJson en factory constructor del DTO
  3. UseCase/Interactor classes -> BLoCs llaman repos directamente, helpers para complejos
  4. injectable/auto DI packages -> Manual get_it en di.dart
  5. auto_route package -> GoRouter con routes declarativos
  6. ScreenUtil/responsive utility packages -> MediaQuery, LayoutBuilder, Flex nativo
  7. Separate error handler middleware -> Result<T> + RequestError
  8. Abstract base BLoC classes -> BLoCs independientes, helpers si necesario
  9. Over-abstracting UI components -> VoltopUI con named constructors
  10. data/ layer naming -> Usar infrastructure/ siempre
  11. core/ or shared/ folders -> Usar common/ siempre
  12. Throwing exceptions in business logic -> Return Result.failure()
  13. Directly importing flutter_components_library -> Importar voltop_ui.dart
  14. Raw Color values in widget code -> Usar VoltopColors constants

  Esta seccion debe ser prominente y clara para que el agente NUNCA genere
  codigo que siga estos anti-patrones. Similar al "Common Pitfalls to Avoid"
  en backend-py.md pero especifico para Flutter.

files_to_modify:
