patterns:
  - go_router: declarative flat route list con named constants
  - static_route_names: static const String en AppRoutes class
  - state_extra: parametros via state.extra
  - navigator_key: GlobalKey para interceptor access
  - go_vs_push: go() para auth flows, push() para normal navigation

acceptance:
