# tasks/05_implement_domain_layer_dtos.yaml
task: implement_domain_layer_dtos
phase: 3 - Domain Layer
level: L3
parent: technical.yaml
status: PENDING
depends_on: [03_implement_architecture_patterns, 04_implement_folder_structure]
assigned_subagent: flutter-development:mobile-flutter

scope: |
  Agregar la seccion de Data Transfer Objects (DTOs) al agente mobile-flutter.md.
  Cubrir la seccion dtos del technical.yaml que define:

  1. Libreria: freezed_annotation ^2.4.4
  2. Ubicacion: features/{feature}/domain/dtos/

  3. Request DTO template:
     - Usa @freezed annotation
     - Usa json_serializable auto-generated fromJson/toJson
     - Incluye part '{name}_request_dto.freezed.dart' y part '{name}_request_dto.g.dart'
     - Campos con required y nullable types

  4. Response DTO template:
     - Usa @freezed annotation
     - Usa CUSTOM fromJson factory (no json_serializable)
     - Solo incluye part '{name}_response_dto.freezed.dart' (NO .g.dart)
     - Manejo manual de field mapping y tipo de datos

  5. Response with envelope template:
     - Extrae datos del array 'data' del API envelope
     - Toma primer elemento del array

  6. Reglas criticas:
     - ALWAYS use @freezed para DTOs
     - ALWAYS colocar en features/{feature}/domain/dtos/
     - Request DTOs: json_serializable auto-generated (incluye .g.dart)
     - Response DTOs: CUSTOM fromJson factory (NO .g.dart)
     - NEVER crear Entity classes separadas
     - NEVER crear Mapper classes
     - Usar @Default() para valores por defecto
     - Usar nullable types para campos opcionales

  Incluir los templates completos con ejemplos de codigo para que el agente
  pueda generar DTOs correctos en ambas variantes.

files_to_modify:
  - plugins/flutter-development/agents/mobile-flutter.md

patterns:
  - freezed_dtos: @freezed con part directives correctas
  - request_dto: json_serializable auto-generated (ambos .freezed.dart y .g.dart)
  - response_dto: custom fromJson factory (solo .freezed.dart)
  - envelope_extraction: extraccion de datos del array 'data' del backend
  - no_entities: DTOs son las entidades del dominio
  - no_mappers: DTOs manejan su propia serializacion

acceptance:
  - prompt incluye template completo de Request DTO con @freezed y json_serializable
  - prompt incluye template completo de Response DTO con custom fromJson
  - prompt incluye template de Response con API envelope extraction
  - prompt indica cuando usar .g.dart part directive (solo en request DTOs)
  - prompt incluye todas las reglas de la seccion dtos.rules
  - prompt diferencia claramente request vs response DTOs

context_files:
  - docs/features/flutter-agents/mobile-flutter/technical.yaml  # dtos section
