# tasks/06_implement_domain_layer_repositories.yaml
task: implement_domain_layer_repositories
phase: 3 - Domain Layer
level: L2
parent: technical.yaml
status: PENDING
depends_on: [03_implement_architecture_patterns, 05_implement_domain_layer_dtos]
assigned_subagent: flutter-development:mobile-flutter

scope: |
  Agregar la seccion de Repository Pattern al agente mobile-flutter.md.
  Cubrir la seccion repository_pattern del technical.yaml que define:

  1. Abstract repository interface template:
     - Ubicacion: features/{feature}/domain/repositories/{feature}_repository.dart
     - Abstract class con metodos Future<Result<T>>
     - Importa Result type de common/infrastructure/networking/result.dart
     - Importa DTOs del feature
     - Metodos tipicos: getById, getAll, create, delete

  2. Repository implementation template:
     - Ubicacion: features/{feature}/infrastructure/{feature}_repository_impl.dart
     - Implements la abstract class
     - Delega a API provider (no hace Dio calls directamente)
     - Constructor recibe API provider

  3. Service interface template:
     - Ubicacion: features/{feature}/domain/services/{feature}_service.dart
     - Para logica de negocio que no encaja en un repository
     - Abstract class con metodos de logica pura
     - Implementacion en infrastructure/

  4. Reglas criticas:
     - ALWAYS definir abstract interface en domain/
     - ALWAYS implementar en infrastructure/
     - ALWAYS retornar Result<T> de metodos de repositorio
     - Repository impls delegan a API providers
     - Registrar abstract type en DI (no concrete)
     - BLoCs dependen de abstract interfaces, nunca de implementaciones

files_to_modify:
  - plugins/flutter-development/agents/mobile-flutter.md

patterns:
  - abstract_repository: interface en domain/ con Result<T> returns
  - repository_impl: implementacion en infrastructure/ delegando a API provider
  - service_interface: abstract class para logica que no es CRUD
  - dependency_inversion: BLoCs dependen de abstractions, DI registra abstract types

acceptance:
  - prompt incluye template de abstract repository con metodos Result<T>
  - prompt incluye template de repository implementation delegando a API provider
  - prompt incluye template de service interface con descripcion de cuando usarlo
  - prompt incluye todas las reglas de repository_pattern.rules
  - prompt indica la diferencia entre repository (data access) y service (business logic)
  - prompt enfatiza dependency inversion (abstract types en DI y BLoC constructors)

context_files:
  - docs/features/flutter-agents/mobile-flutter/technical.yaml  # repository_pattern section
