patterns:
  - clean_architecture: 4 capas con responsabilidades claras y dependency flow
  - feature_based: organizacion feature-first, luego por capas dentro de cada feature
  - architectural_decisions: 5 decisiones con rationale y reglas explicitas
  - dependency_direction: domain no depende de nada, infrastructure implementa domain
  - layer_diagram: diagrama ASCII o descripcion del flujo de dependencias

acceptance:
