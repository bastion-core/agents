# tasks/07_implement_networking_error_handling.yaml
task: implement_networking_error_handling
phase: 4 - Infrastructure Layer
level: L3
parent: technical.yaml
status: PENDING
depends_on: [06_implement_domain_layer_repositories]
assigned_subagent: flutter-development:mobile-flutter

scope: |
  Agregar la seccion de Networking y Error Handling al agente mobile-flutter.md.
  Cubrir la seccion networking del technical.yaml que define:

  1. HTTP Client: Dio ^5.6.0
  2. Base URL management: UrlPaths class con environment-based host switching

  3. Interceptor behavior (VoltopChargingInterceptor):
     - onRequest: agrega CHANNEL header (ios/android), Authorization Bearer token
     - onResponse: guarda auth token de headers y body
     - onError: maneja 401 (clear auth, navegar login), logs a CombinedLogger

  4. API Response Format (envelope):
     - Backend retorna { success, http_status, data: [...], message }
     - SIEMPRE extraer primer elemento del array 'data' para single-object responses

  5. BaseApiProvider:
     - Abstract class que todos los API providers extienden
     - Provee acceso a Dio instance configurado
     - Metodos: requestWithHeaders(), multipartRequest(), requestWithContentType()

  6. API Provider template completo:
     - Extiende BaseApiProvider
     - Constructor: super.dio
     - Metodos retornan Future<Result<T>>
     - Try-catch con DioException -> Result.failure(RequestError.response())
     - Catch-all -> Result.failure(RequestError.unknown())

  7. UrlPaths pattern:
     - Static methods en UrlPaths class
     - UrlPaths._() private constructor
     - _withLocale() wrapper para query parameter locale
     - Cada endpoint retorna full URL con host prefix

  8. Error handling:
     - Result<T> sealed class (success/failure)
     - RequestError sealed class (connectivity, response, timeout, unknown)
     - Propiedades: type (String), message (String)
     - Consumo con result.when(success:, failure:)

  9. Reglas criticas:
     - ALWAYS retornar Result<T> de repositories y API providers
     - NEVER throw exceptions en business logic
     - ALWAYS catch DioException en API providers
     - ALWAYS proveer catch-all para errores inesperados

files_to_modify:
  - plugins/flutter-development/agents/mobile-flutter.md

patterns:
  - dio_client: Dio con interceptor y BaseApiProvider
  - result_type: Result<T> sealed class (success/failure)
  - request_error: RequestError sealed class (connectivity, response, timeout, unknown)
  - api_provider: template con try-catch, Result returns, envelope parsing
  - url_paths: static methods con _withLocale wrapper
  - no_exceptions: Result<T> reemplaza exception-based error handling

