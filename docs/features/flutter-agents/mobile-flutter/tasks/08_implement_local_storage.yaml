# tasks/08_implement_local_storage.yaml
task: implement_local_storage
phase: 4 - Infrastructure Layer
level: L1
parent: technical.yaml
status: PENDING
depends_on: [07_implement_networking_error_handling]
assigned_subagent: flutter-development:mobile-flutter

scope: |
  Agregar la seccion de Local Storage al agente mobile-flutter.md.
  Cubrir la seccion local_storage del technical.yaml que define:

  1. Libreria: shared_preferences ^2.3.2
  2. Uso: key-value persistence para tokens, user data, retry counts, session data
  3. Objetos complejos se serializan a JSON strings

  4. Storage service pattern template:
     - Clase que wrappea SharedPreferences con metodos tipados
     - Constructor recibe SharedPreferences instance
     - Keys como static const String
     - Metodos: saveData (jsonEncode + setString), getData (getString + jsonDecode), clearData (remove)

  5. Reglas:
     - ALWAYS wrappear SharedPreferences en una service class
     - ALWAYS usar const key strings (static const String)
     - Usar jsonEncode/jsonDecode para objetos complejos
     - Registrar storage services como lazySingletons en DI

files_to_modify:
  - plugins/flutter-development/agents/mobile-flutter.md

patterns:
  - storage_service: clase wrapper con metodos tipados
  - json_serialization: jsonEncode/jsonDecode para objetos complejos
  - const_keys: static const String para keys de SharedPreferences
  - lazy_singleton: registration en DI como lazySingleton

acceptance:
  - prompt incluye template de storage service con SharedPreferences
  - prompt incluye patron de serializacion JSON para objetos complejos
  - prompt incluye todas las reglas de local_storage.rules
  - prompt indica registrar storage services como lazySingletons

