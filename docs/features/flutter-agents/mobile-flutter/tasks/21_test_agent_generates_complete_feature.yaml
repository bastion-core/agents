scope: |
  Validar que el agente mobile-flutter.md completo genera implementaciones
  correctas para una funcionalidad nueva. Probar con un escenario de feature
  completo que cubra todas las capas:

  Escenario de prueba sugerido: "Crear feature de 'notifications' con listado
  y marcado de notificaciones como leidas"

  Validaciones:
  1. Domain layer:
     - DTO con @freezed (response DTO con custom fromJson)
     - Abstract repository interface con metodos Result<T>
     - Ubicacion correcta en features/notifications/domain/

  2. Infrastructure layer:
     - API provider extendiendo BaseApiProvider con Result<T> returns
     - Repository implementation delegando a API provider
     - URL paths agregados en settings/url_paths.dart
     - Ubicacion correcta en features/notifications/infrastructure/

  3. Application layer:
     - BLoC con event.map() pattern
     - Freezed events y states con part directives correctas
     - Constructor injection de repository y logger
     - Loading/success/failure state transitions
     - Ubicacion correcta en features/notifications/application/bloc/

  4. Presentation layer:
     - Screen usando BlocBuilder con state.when()
     - VoltopUI components (VoltopText, VoltopButton, etc.)
     - VoltopColors para colores
     - Ubicacion correcta en features/notifications/presentation/screens/

  5. Settings:
     - DI registration con abstract types
     - Route registration en AppRoutes
     - registerFactory para BLoC, registerLazySingleton para repo/provider

  6. Tests:
     - Mock file con @GenerateMocks
     - BLoC tests con blocTest, provideDummy, Fake/Mock
     - Tests de initial state, success, failure paths

  7. Anti-patterns:
     - NO Entity classes separadas
     - NO UseCase/Interactor classes
     - NO Mapper classes
     - NO raw Color values
     - NO raw Flutter widgets en lugar de VoltopUI
     - NO getIt directo en BLoCs

test_scenarios:
  - complete_feature_generation:
