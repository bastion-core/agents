# tasks/22_test_agent_avoids_anti_patterns.yaml
task: test_agent_avoids_anti_patterns
phase: 12 - Validation
level: L2
parent: technical.yaml
status: PENDING
depends_on: [21_test_agent_generates_complete_feature]
assigned_subagent: flutter-development:mobile-flutter

scope: |
  Validar que el agente mobile-flutter.md rechaza o corrige correctamente
  solicitudes que implicarian generar anti-patrones. Probar con escenarios
  que intenten inducir al agente a romper las reglas del proyecto:

  Escenarios de prueba:

  1. Request for Entity layer:
     input: "Crear un Entity separado del DTO para el usuario"
     expected: agente explica que DTOs son las entidades, no crea entities/ folder

  2. Request for UseCase/Interactor:
     input: "Crear un UseCase para obtener notificaciones"
     expected: agente explica que BLoCs reemplazan UseCases, implementa logica en BLoC

  3. Request for Mapper:
     input: "Crear un Mapper para convertir la respuesta API a un Entity"
     expected: agente explica que DTOs manejan serialization via fromJson factory

  4. Request for data/ layer:
     input: "Crear la capa de datos con el repositorio"
     expected: agente usa infrastructure/ en lugar de data/

  5. Request for raw widgets:
     input: "Agregar un TextButton y un Text widget"
     expected: agente usa VoltopButton.text() y VoltopText.body() en su lugar

  6. Request for raw colors:
     input: "Usar Color(0xFF0FC7E1) para el boton"
     expected: agente usa VoltopColors.primary en su lugar

  7. Request for auto_route:
     input: "Agregar routing con auto_route"
     expected: agente usa go_router con GoRouter declarativo

  8. Request for injectable:
     input: "Configurar injectable para DI automatica"
     expected: agente usa manual get_it registration en di.dart

test_scenarios:
  - anti_pattern_rejection:
      input: escenarios que inducen anti-patrones
      expected: agente no genera anti-patrones y explica la alternativa correcta
  - graceful_correction:
      input: terminologia incorrecta del usuario (Entity, UseCase, data layer)
      expected: agente entiende la intencion y redirige al patron correcto

validations:
  - agente nunca genera Entity classes separadas de DTOs
  - agente nunca genera UseCase/Interactor classes
  - agente nunca genera Mapper classes
  - agente nunca usa data/ en lugar de infrastructure/
  - agente nunca genera raw Flutter widgets donde VoltopUI aplica
  - agente nunca usa raw Color values donde VoltopColors aplica
  - agente explica el patron correcto al usuario cuando se solicita un anti-patron

context_files:
