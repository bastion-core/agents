patterns:
  - feature_checklist: 12 pasos secuenciales con archivos y patrones
  - step_by_step: cada paso indica archivos a crear y template a seguir
  - app_initialization: secuencia de inicializacion de la app
  - global_vs_local_blocs: criterio de cuando proveer BLoC global vs local

acceptance:
