assigned_subagent: flutter-development:mobile-flutter

scope: |
  Agregar la seccion de New Feature Checklist al agente mobile-flutter.md.
  Cubrir la seccion file_templates del technical.yaml que define los 12 pasos
  secuenciales para crear una nueva feature:

  1. Create feature folder structure (8 subcarpetas)
  2. Create domain layer (DTOs, repository interface, service interface, enums)
  3. Create infrastructure layer (API provider, repo impl, service impl)
  4. Create application layer (BLoC, events, states, helpers)
  5. Create presentation layer (screens, widgets)
  6. Add URL paths en settings/url_paths.dart
  7. Register dependencies en settings/di.dart
  8. Add routes en settings/app_routes.dart
  9. Run code generation (build_runner)
  10. Create tests (mock file, BLoC tests, infrastructure tests)
  11. Run code generation for mocks (build_runner)
  12. Run tests (flutter test)

  Cada paso debe incluir los archivos especificos a crear con sus paths completos
  y el patron/template a seguir. Esta seccion sirve como checklist de verificacion
  que el agente debe seguir al implementar cualquier nueva funcionalidad.

  Incluir tambien la seccion de app_initialization (secuencia de inicializacion)
  y global_blocs (BLoCs globales vs locales) del technical.yaml.

files_to_modify:
