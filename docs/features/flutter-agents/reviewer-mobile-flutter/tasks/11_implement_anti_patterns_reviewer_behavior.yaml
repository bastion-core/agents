assigned_subagent: flutter-development:reviewer-mobile-flutter

scope: |
  Agregar al agente reviewer-mobile-flutter.md la seccion de Anti-Patterns del Reviewer.
  Esta seccion es CRITICA porque define el comportamiento correcto del reviewer
  y evita que solicite cambios innecesarios o incorrectos para el proyecto.
  Cubrir la seccion del technical.yaml:
  - anti_patterns (reviewer_must_not, reviewer_must)

  Contenido a incluir:

  1. Reviewer MUST NOT (cosas que el reviewer NO debe solicitar):
     - NO solicitar UseCase/Interactor classes (BLoCs llaman repos directamente)
     - NO solicitar Entity classes separadas (DTOs son las entities)
     - NO solicitar Mapper classes (DTOs manejan su propia serializacion)
     - NO solicitar injectable u otros auto-DI packages (manual get_it)
     - NO solicitar auto_route (usar GoRouter)
     - NO solicitar ScreenUtil (responsive design nativo de Flutter)
     - NO solicitar abstract base BLoC classes (cada BLoC auto-contenido)
     - NO solicitar data/ layer naming (usar infrastructure/)
     - NO solicitar core/ o shared/ folders (usar common/)
     - NO solicitar over-abstracting UI (VoltopUI con named constructors es suficiente)
     - NO solicitar raw Color values verification innecesaria
     - NO solicitar premature optimization sin medir performance
     - NO solicitar over-testing de implementation details
     - NO pedir future-proofing sin justificacion
     - NO demandar mas tests que los definidos en la estrategia por capa
     - NO sugerir refactoring de codigo funcional que no viola principios
     - NO solicitar capas adicionales mas alla de Widget -> BLoC -> Repository -> ApiProvider
     - NO solicitar directamente flutter_components_library imports (usar VoltopUI)

  2. Reviewer MUST (cosas que el reviewer SIEMPRE debe verificar):
     - Cumplimiento de Clean Architecture con 4 capas y feature modularization
     - Reportar bugs reales y vulnerabilidades de seguridad
     - Verificar tests segun estrategia por capa (BLoC 80%+, infra 60%+, domain 90%+)
     - Evaluar solo contra criterios de calidad establecidos
     - Verificar Result<T> pattern en repos y API providers
     - Verificar result.when() en BLoC handlers
     - Verificar Freezed sealed classes para events y states
     - Verificar event.map() delegation en BLoC constructors
     - Verificar state.when() consumo exhaustivo en widgets
     - Verificar DI registration correcta (factory BLoCs, lazySingleton servicios)
     - Verificar imports respetan boundaries de capas y features
     - Verificar BLoCs no demasiado grandes (>6 handlers sin helpers)
     - Verificar VoltopUI components en lugar de widgets raw
     - Verificar VoltopColors en lugar de Color() values crudos
     - Verificar i18n (.i18n) para texto visible
     - Ser constructivo, especifico, educativo, balanceado, respetuoso y pragmatico

