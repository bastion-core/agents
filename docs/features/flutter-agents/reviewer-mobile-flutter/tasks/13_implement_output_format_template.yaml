# tasks/13_implement_output_format_template.yaml
task: implement_output_format_template
phase: 9 - Output Format
level: L3
parent: technical.yaml
status: PENDING
depends_on: [10_implement_score_rules_and_severity_system, 12_implement_approval_checklist]
assigned_subagent: flutter-development:reviewer-mobile-flutter

scope: |
  Agregar al agente reviewer-mobile-flutter.md la seccion de Output Format con el
  template completo del reporte de revision. Esta seccion define la estructura exacta
  del output que el agente debe generar. Cubrir las secciones del technical.yaml:
  - output_format (template completo)
  - agent_contract.output_sections

  Contenido a incluir:

  1. Template completo del reporte de revision en markdown:

     a) Code Review Summary:
        - Overall Assessment: APPROVE | REQUEST_CHANGES | COMMENT
        - Change Type: Feature | Bug Fix | Refactoring | UI Update | Tests Only | etc.
        - Risk Level: Low | Medium | High
        - Estimated Review Time: X minutes

     b) Architecture (Score: X/10):
        - Analisis de decisiones arquitectonicas
        - Strengths (lista)
        - Issues Found (con explicacion y sugerencia)
        - Recommendations (acciones especificas)

     c) Code Quality (Score: X/10):
        - Analisis de calidad de codigo
        - Strengths
        - Issues Found (con file:line references)
        - Recommendations

     d) Testing (Score: X/10):
        - Analisis de cobertura y calidad de tests
        - Coverage (porcentaje)
        - Strengths
        - Missing Tests
        - Recommendations (con ejemplos especificos de tests faltantes)

     e) Security:
        - Findings (None o lista de issues de seguridad)

     f) Performance:
        - Findings (None o lista de concerns de rendimiento)

     g) Action Items:
        - Must Fix (Blocking Merge) - numerados
        - Should Fix (High Priority) - numerados
        - Consider (Nice to Have) - numerados

     h) Decision:
        - APPROVE o REQUEST CHANGES
        - Justification (explicar por que)
        - IMPORTANT: no agregar metricas, tablas de scores ni secciones colapsables

  2. Reglas del formato:
     - Idioma del reporte: English
     - Puntajes SOLO en encabezados de seccion (Score: X/10)
     - NO agregar resumenes de metricas adicionales al final
     - Issues con referencia a file:line cuando sea posible
     - Recomendaciones de testing con ejemplos especificos

files_to_modify:
  - plugins/flutter-development/agents/reviewer-mobile-flutter.md

patterns:
  - review_template: template markdown completo con 8 secciones
  - score_in_headers: puntaje solo en encabezados ### Section (Score: X/10)
  - file_line_references: issues con referencia a archivo y linea
  - no_extra_summaries: prohibido agregar tablas o secciones adicionales al final

acceptance:
  - prompt incluye template completo del reporte con las 8 secciones
  - prompt muestra formato exacto de encabezados con Score: X/10
  - prompt incluye ejemplo de Issues Found con file:line references
  - prompt incluye ejemplo de Testing Recommendations con tests especificos
  - prompt incluye los 3 niveles de Action Items (Must Fix, Should Fix, Consider)
  - prompt incluye Decision con Justification
  - prompt incluye nota IMPORTANT sobre no agregar metricas adicionales
  - prompt indica que el idioma del reporte es English

