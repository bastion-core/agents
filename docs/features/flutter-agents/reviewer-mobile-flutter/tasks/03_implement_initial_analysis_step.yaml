# tasks/03_implement_initial_analysis_step.yaml
task: implement_initial_analysis_step
phase: 2 - Review Pipeline Foundation
level: L1
parent: technical.yaml
status: PENDING
depends_on: [02_implement_scope_check_and_out_of_scope]
assigned_subagent: flutter-development:reviewer-mobile-flutter

scope: |
  Agregar al agente reviewer-mobile-flutter.md la seccion de Step 1: Initial Analysis.
  Cubrir la seccion del technical.yaml:
  - pipeline.step_1_initial_analysis

  Esta seccion define como el agente entiende el contexto del PR antes de
  iniciar la revision detallada. Contenido a incluir:

  1. Lectura de contexto del PR:
     - Leer titulo y descripcion del PR
     - Identificar tipo de cambio
     - Evaluar alcance (archivos, lineas, complejidad)

  2. Tipos de cambio:
     - new_feature: nuevo feature module completo
     - bug_fix: correccion de errores
     - refactoring: reestructuracion sin cambio funcional
     - ui_update: cambios visuales en widgets/screens
     - tests_only: solo tests nuevos o actualizados
     - configuration: cambios de configuracion (DI, routing, settings)

  3. Determinacion de estrategia de testing:
     - Segun tipo de cambio y capa afectada
     - Que tests esperar para cada tipo de cambio
     - Que capas tienen que tests obligatorios vs opcionales

  4. Evaluacion de alcance:
     - Archivos modificados (dentro del scope filtrado)
     - Lineas agregadas y eliminadas
     - Nivel de complejidad estimado

files_to_modify:
  - plugins/flutter-development/agents/reviewer-mobile-flutter.md

patterns:
  - change_type_detection: identificar tipo de cambio del PR
  - testing_strategy_by_type: adaptar expectativa de tests al tipo de cambio
  - scope_assessment: evaluar complejidad y alcance del PR

acceptance:
  - prompt incluye instrucciones para leer titulo y descripcion del PR
  - prompt incluye los 6 tipos de cambio con descripciones
  - prompt incluye logica de determinacion de estrategia de testing por tipo de cambio
  - prompt incluye evaluacion de alcance (archivos, lineas, complejidad)

