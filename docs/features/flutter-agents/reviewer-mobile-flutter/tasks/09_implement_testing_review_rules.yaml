scope: |
  Agregar al agente reviewer-mobile-flutter.md la seccion de Step 4: Testing Review.
  Esta es una seccion CRITICA que define como evaluar la calidad y cobertura de tests.
  Cubrir las secciones del technical.yaml:
  - pipeline.step_4_testing_review
  - testing_strategy

  Contenido a incluir:

  1. Test Location Pattern:
     - Estructura mirror de lib/ en test/
     - Ejemplo: lib/features/auth/application/bloc/auth_bloc.dart
       -> test/features/auth/application/bloc/auth_bloc_test.dart
     - Regla: test/ mirror de lib/ con sufijo _test.dart

  2. Testing by Layer con pesos y coverage targets:

     a) BLoC Tests (70% del peso):
        - what_to_test: estado inicial, transiciones por evento (success/failure),
          flujos secuenciales, seed state, edge cases
        - rules: blocTest helper, Mockito @GenerateMocks, Fake para analytics/logger,
          Mock para repos, provideDummy<Result<T>>(), close BLoC en tearDown,
          testar success Y failure, seed() para estado especifico
        - coverage_target: 80%+

     b) Infrastructure Tests (20% del peso):
        - what_to_test: repo impls delegando a API providers, API provider parsing,
          API provider error handling, storage services
        - rules: mockear API providers, testar Result.success y Result.failure paths,
          verificar extraccion de data array
        - coverage_target: 60%+

     c) Domain Tests (10% del peso):
        - what_to_test: logica de negocio en domain models, validaciones en DTOs, enums
        - rules: sin mocks (logica pura), cubrir edge cases
        - coverage_target: 90%+ (cuando hay logica de dominio)

  3. Testing Strategy by Change Type:
     - bloc_changes: archivos en lib/features/*/application/bloc/ -> bloc_test requeridos
     - infrastructure_changes: archivos en lib/features/*/infrastructure/ -> tests requeridos
     - domain_changes: archivos en lib/features/*/domain/ con logica -> tests puros
     - presentation_changes: archivos en lib/features/*/presentation/ -> widget tests opcionales
     - common_changes: archivos en lib/common/ -> tests segun tipo

  4. Mock Patterns:
     - mockito_generate_mocks: @GenerateMocks en archivo separado en mocks/
     - fake_pattern: Fake para servicios con stub de todos los metodos (analytics/logger)
     - mock_pattern: Mock para servicios con verify/stub de llamadas especificas
     - provide_dummy: provideDummy<Result<T>>() en setUpAll para tipos genericos

