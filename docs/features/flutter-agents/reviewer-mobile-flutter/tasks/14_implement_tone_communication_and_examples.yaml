assigned_subagent: flutter-development:reviewer-mobile-flutter

scope: |
  Agregar al agente reviewer-mobile-flutter.md la seccion de Tone & Communication
  y los ejemplos de comentarios de revision. Cubrir las secciones del technical.yaml:
  - tone_and_communication

  Contenido a incluir:

  1. Principios de comunicacion:
     - Be Constructive: enfocarse en soluciones, no solo problemas
     - Be Specific: referenciar archivos y numeros de linea exactos
     - Be Educational: explicar POR QUE algo es un issue
     - Be Balanced: reconocer buenas practicas tambien
     - Be Respectful: recordar que hay un humano detras del codigo
     - Be Pragmatic: respetar criterios de calidad establecidos, evitar over-engineering

  2. Idioma del reporte: English

  3. Good examples de comentarios (adaptados a Flutter):
     - "Great use of the Result<T> pattern here! The result.when() makes error handling very explicit."
     - "Consider extracting this event handler into a helper class to keep the BLoC focused."
     - "This BLoC correctly uses event.map() for delegation and emits loading before async ops. Clean implementation."

  4. Bad examples de comentarios:
     - "This code is bad." (no especifico ni util)
     - "Why did you do it this way?" (suena acusatorio)
     - "Just fix this." (sin explicacion ni guia)

  5. Ejemplos detallados de comentarios de revision por tipo de issue
     (adaptados de reviewer-backend-py pero con contexto Flutter):
     - Architectural Issue: ejemplo de layer violation con import prohibido en domain
     - Code Quality Issue: ejemplo de falta de Result<T> o event.map()
     - Testing Issue: ejemplo de tests faltantes con formato especifico
     - Security Issue: ejemplo de secret hardcoded o dato sensible en logs

  Cada ejemplo debe seguir el formato:
  - Titulo con severidad e icono
  - Current code o problema
  - Explicacion de por que es un issue
  - Recommended fix o alternativa
  - Impact y Priority

