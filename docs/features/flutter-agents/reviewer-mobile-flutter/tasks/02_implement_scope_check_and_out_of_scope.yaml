# tasks/02_implement_scope_check_and_out_of_scope.yaml
task: implement_scope_check_and_out_of_scope
phase: 2 - Review Pipeline Foundation
level: L2
parent: technical.yaml
status: PENDING
depends_on: [01_create_reviewer_agent_foundation]
assigned_subagent: flutter-development:reviewer-mobile-flutter

scope: |
  Agregar al agente reviewer-mobile-flutter.md la seccion de Step 0: Scope Check
  y el flujo Out of Scope. Cubrir las secciones del technical.yaml:
  - pipeline.step_0_scope_check
  - out_of_scope_rule

  Esta seccion define el gate pre-pipeline que determina si el PR contiene
  archivos revisables. Es critica porque evita analisis innecesarios y
  desbloquea PRs que no requieren revision tecnica.

  Contenido a incluir:

  1. Reviewable paths (archivos dentro del scope):
     - lib/features/**/*.dart
     - lib/common/**/*.dart
     - lib/settings/**/*.dart
     - lib/logs/**/*.dart
     - lib/main.dart
     - test/**/*.dart

  2. Exclusion de archivos generados:
     - *.freezed.dart
     - *.g.dart
     - *.mocks.dart

  3. Non-reviewable examples (lista completa de archivos fuera del scope):
     - archivos de configuracion, documentacion, assets, CI/CD, infraestructura
     - pubspec.yaml, pubspec.lock, analysis_options.yaml, build.yaml
     - archivos de plataforma nativa (android/, ios/, web/, etc.)
     - archivos de Firebase, archivos de entorno

  4. Logica de deteccion:
     - Filtrar archivos modificados contra reviewable_paths
     - Excluir archivos generados
     - Si interseccion vacia -> flujo out_of_scope
     - Si hay archivos revisables -> continuar pipeline normal

  5. Template de respuesta Out of Scope:
     - Formato exacto del comment_template del technical.yaml
     - Decision: APPROVE
     - Idioma: English
     - Accion: post comment on PR via gh CLI

  6. Reglas importantes:
     - La respuesta Out of Scope debe ser en ingles
     - NO incluir scores de Architecture, Code Quality ni Testing
     - NO ejecutar los steps subsiguientes del pipeline

files_to_modify:
  - plugins/flutter-development/agents/reviewer-mobile-flutter.md

patterns:
  - scope_gate: filtrar archivos contra reviewable_paths antes de analizar
  - generated_exclusion: excluir *.freezed.dart, *.g.dart, *.mocks.dart
  - out_of_scope_response: template fijo con APPROVE automatico en ingles

acceptance:
  - prompt incluye lista completa de reviewable_paths
  - prompt incluye lista de archivos generados a excluir
  - prompt incluye lista de non-reviewable examples
  - prompt incluye logica de deteccion (filtrar y verificar interseccion)
  - prompt incluye template exacto de respuesta Out of Scope
  - prompt indica que decision es APPROVE para out-of-scope
  - prompt indica que respuesta debe ser en ingles
  - prompt indica que NO se ejecutan steps subsiguientes si out-of-scope

context_files:
  - docs/features/flutter-agents/reviewer-mobile-flutter/technical.yaml  # out_of_scope_rule, pipeline.step_0
  - plugins/python-development/agents/reviewer-backend-py.md  # Step 0 Scope Check reference
