  - prompt incluye las 6 reglas de dto_checks (incluyendo NO entity y NO mapper)
  - prompt incluye las 6 reglas de di_checks (incluyendo NO injectable y NO direct get_it)
  - prompt incluye las 5 reglas de routing_checks
  - prompt muestra ejemplo de cadena correcta: Widget -> BLoC -> Repository -> ApiProvider
  - prompt muestra ejemplo de DI registration correcta con factory vs lazySingleton

