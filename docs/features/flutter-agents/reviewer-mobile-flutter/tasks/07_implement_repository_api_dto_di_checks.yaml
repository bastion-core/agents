patterns:
  - repository_abstraction: abstract en domain, impl en infrastructure, delega a API provider
  - api_provider_result: extends BaseApiProvider, catch DioException, retorna Result<T>
  - dto_in_domain: DTOs con @freezed en domain/, sin Entity ni Mapper separados
  - manual_di: get_it manual con factory para BLoCs, lazySingleton para servicios
  - go_router: GoRouter con rutas estaticas y context.go/push

acceptance:
