assigned_subagent: flutter-development:reviewer-mobile-flutter

scope: |
  Agregar al agente reviewer-mobile-flutter.md las reglas de puntaje y el sistema
  de severidad para clasificar hallazgos. Cubrir las secciones del technical.yaml:
  - score_rules
  - output_format (seccion de action_items con clasificacion de severidad)

  Contenido a incluir:

  1. Score Rules:
     - authoritative_source: puntajes en encabezados de seccion
       (### Architecture (Score: X/10))
     - consistency: puntaje debe reflejar el analisis de la seccion
     - automated_extraction: sistemas automatizados extraen puntajes de los encabezados
     - prohibited: no agregar resumenes de metricas, tablas de puntajes ni secciones
       colapsables adicionales

  2. Scoring Guidelines:
     - Escala 1-10 para cada dimension (Architecture, Code Quality, Testing)
     - El puntaje debe ser coherente con los hallazgos reportados
     - Score alto (8-10): pocos o ningun issue, buenas practicas presentes
     - Score medio (5-7): algunos issues no criticos, areas de mejora
     - Score bajo (1-4): issues criticos, violaciones de principios

  3. Severity Classification para action items:
     - Must Fix (Blocking Merge): issues criticos que impiden el merge
       (layer violations, security vulnerabilities, broken patterns)
     - Should Fix (High Priority): issues importantes pero no bloqueantes
       (missing tests, naming violations, performance concerns)
     - Consider (Nice to Have): sugerencias de mejora, optimizaciones opcionales

  4. Decision Criteria:
     - APPROVE: ningun Must Fix, architecture y code quality >= 6/10
     - REQUEST_CHANGES: algun Must Fix presente, o puntaje < 6 en alguna dimension
     - COMMENT: solo sugerencias sin issues criticos

