assigned_subagent: flutter-development:reviewer-mobile-flutter

scope: |
  Agregar al agente reviewer-mobile-flutter.md la seccion de Step 2: Architecture Review.
  Esta es una seccion CRITICA y extensa. Cubrir las secciones del technical.yaml:
  - pipeline.step_2_architecture_review (checks completos)
  - review_dimensions.architecture (scope detallado)

  Contenido a incluir:

  1. Clean Architecture Compliance:
     - 4 capas: presentation, application/BLoC, domain, infrastructure
     - Dependency rule: Presentation -> Application -> Domain <- Infrastructure
     - Domain purity: domain layer libre de imports de infrastructure, Flutter, BLoC, Dio, get_it
     - Feature modularization: cada feature auto-contenido con sus 4 capas
     - Module structure: la estructura de carpetas esperada por feature

  2. Architecture Checks (del pipeline.step_2):
     - domain_layer_purity: domain no importa de infrastructure, Flutter, BLoC, Dio, get_it
     - dependency_direction: Presentation -> Application -> Domain <- Infrastructure
     - module_boundaries: features no importan de infrastructure/ de otros features
     - module_structure: cada feature con 4 capas
     - repository_pattern: abstract interface en domain/, implementacion en infrastructure/
     - bloc_pattern: BLoC en application/bloc/ con Freezed events y states
     - di_registration: abstract types en get_it, factories para BLoCs, lazySingletons para servicios

  3. SOLID Principles aplicados a Flutter:
     - single_responsibility: un BLoC/widget/repository = una responsabilidad
     - dependency_inversion: BLoCs dependen de abstracciones (domain interfaces)
     - open_closed: extensible via composicion
     - interface_segregation: interfaces de repositorio especificas por feature
     - liskov_substitution: implementaciones intercambiables para testing

  4. Design Patterns esperados vs red flags:
     Expected patterns:
     - BLoC + Freezed: state management con sealed unions y pattern matching exhaustivo
     - Repository Pattern: abstract en domain/, implementacion en infrastructure/
     - Result<T>: sealed class para manejo funcional de errores
     - DI via get_it: manual registration con feature-grouped methods
     - API Provider: extends BaseApiProvider para llamadas HTTP
     - Helper Pattern: extraccion de logica compleja de BLoCs
     - DTO Pattern: Freezed classes como data carriers Y domain entities
     - VoltopUI: abstraction layer sobre flutter_components_library

     Red flags:
     - God Widget (>300 lineas)
     - God BLoC (>200 lineas o >6 handlers sin helpers)
     - Direct Dio in BLoC
     - UseCase/Interactor Layer innecesario
     - Entity Layer separado de DTOs
     - Mapper Classes separadas
     - Cross-feature Infrastructure Import
     - Circular Dependencies
     - Direct get_it Access en BLoCs/repositories
     - Injectable/Auto-DI packages
     - Abstract Base BLoC
     - Throwing Exceptions in Business Logic

