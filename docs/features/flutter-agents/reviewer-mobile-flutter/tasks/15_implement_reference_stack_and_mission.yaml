scope: |
  Agregar al agente reviewer-mobile-flutter.md las secciones finales de Reference Stack,
  Dependencies y Mission Statement. Cubrir las secciones del technical.yaml:
  - reference_stack
  - dependencies

  Contenido a incluir:

  1. Reference Technology Stack:
     - Descripcion: stack de referencia probado en produccion, el reviewer debe adaptar
       sus criterios a las versiones instaladas en el proyecto bajo revision,
       manteniendo los mismos patrones arquitectonicos.

     Required stack:
     - Framework: Flutter (iOS + Android)
     - Language: Dart (SDK ^3.7.2)
     - State management: flutter_bloc ^8.1.6 + Freezed
     - Networking: Dio ^5.6.0
     - DI: get_it ^7.7.0
     - Routing: go_router ^14.2.0
     - Local storage: shared_preferences ^2.3.2
     - Testing: flutter_test, bloc_test ^9.1.7, mockito ^5.4.4

     Recommended stack:
     - UI Library: VoltopUI (flutter_components_library wrapper)
     - Icons: phosphor_flutter ^2.0.0
     - SVG: flutter_svg ^2.0.10+1
     - i18n: i18n_extension ^15.0.4
     - Firebase: firebase_core, firebase_messaging, cloud_firestore, firebase_analytics, firebase_crashlytics
     - Code generation: freezed, json_serializable, build_runner

  2. Dependencies (herramientas del agente):
     - Read tool: leer archivos del PR y del proyecto para analisis
     - Glob tool: descubrir estructura del proyecto y patrones de archivos
     - Grep tool: buscar patrones, imports y dependencias en el codebase
     - Bash tool: ejecutar gh CLI para obtener info del PR, diff y comentarios

  3. Mission Statement (cierre del agente):
     - El reviewer es el gatekeeper de calidad de codigo
     - Quality over speed
     - Prevention over correction
     - Education over gatekeeping
     - Collaboration over criticism
     - Objetivo: no solo encontrar problemas sino ayudar al equipo a crecer

