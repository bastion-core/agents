# tasks/01_create_reviewer_agent_foundation.yaml
task: create_reviewer_agent_foundation
phase: 1 - Foundation
level: L2
parent: technical.yaml
status: PENDING
depends_on: []
assigned_subagent: flutter-development:reviewer-mobile-flutter

scope: |
  Crear el archivo base del agente reviewer-mobile-flutter.md en
  plugins/flutter-development/agents/. Incluir el frontmatter YAML
  (name, description, model, color) y la seccion de introduccion que define
  el rol del agente como revisor de codigo especializado en Flutter mobile.

  Cubrir las secciones del technical.yaml:
  - feature: reviewer_mobile_flutter
  - layer: agent
  - architecture: Prompt-driven Agent (Plugin System)
  - agent_contract: invocacion, modelo, tools, inputs, success_output

  El agente debe presentarse como un Code Review Agent especializado en
  Flutter mobile con Clean Architecture, BLoC + Freezed, Result<T> pattern
  y get_it DI. Debe indicar claramente que su mision es revisar PRs y
  generar reportes estructurados con decision APPROVE o REQUEST_CHANGES.

  Incluir la seccion Review Scope con las 3 dimensiones y sus pesos:
  - Architecture & Design (30%): Clean Architecture, SOLID, patrones, capas
  - Code Quality (40%): Dart best practices, BLoC, widgets, error handling, seguridad
  - Testing & Coverage (30%): cobertura por capa, calidad de tests, mock patterns

  Tomar como referencia la estructura del reviewer-backend-py.md para
  el formato, tono y organizacion del agente.

  El frontmatter debe seguir el formato:
  ---
  name: reviewer-mobile-flutter
  description: Comprehensive code reviewer for Flutter mobile PRs...
  model: sonnet
  color: purple
  ---

files_to_create:
  - plugins/flutter-development/agents/reviewer-mobile-flutter.md

patterns:
  - frontmatter: name reviewer-mobile-flutter, description, model sonnet, color purple
  - agent_role: code reviewer especializado en Flutter mobile con Clean Architecture
  - review_dimensions: architecture 30%, code_quality 40%, testing 30%
  - mission_statement: gatekeeper de calidad de codigo para PRs Flutter

acceptance:
  - archivo reviewer-mobile-flutter.md creado con frontmatter YAML valido
  - seccion de introduccion define rol del agente como Code Review Agent para Flutter mobile
  - menciona Clean Architecture con feature-based modularization, BLoC + Freezed, Result<T>, get_it DI
  - lista las herramientas disponibles (Read, Glob, Grep, Bash)
  - define inputs esperados (pull_request, pr_title, pr_description, changed_files, project_codebase)
  - define output esperado (reporte markdown con puntajes y decision APPROVE/REQUEST_CHANGES)
  - incluye seccion Review Scope con las 3 dimensiones y sus pesos
  - tono y formato consistentes con reviewer-backend-py.md

