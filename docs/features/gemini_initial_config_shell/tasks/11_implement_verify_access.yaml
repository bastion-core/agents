scope: |
  Implementar el paso 6 del pipeline: verificar que el acceso a Vertex AI
  funciona correctamente con la configuracion aplicada.

  Flujo:
    1. Ejecutar verificacion de acceso:
       - Comando: gcloud ai models list --region={REGION} --limit=1
    2. Si tiene exito: log_success indicando acceso verificado
    3. Si falla: log_error con diagnostico y exit code 5
       - Sugerir verificar que la API esta habilitada
       - Sugerir verificar permisos del SA
       - Sugerir esperar unos minutos (propagacion de IAM)

  En modo --dry-run: mostrar el comando que se ejecutaria sin ejecutarlo.

