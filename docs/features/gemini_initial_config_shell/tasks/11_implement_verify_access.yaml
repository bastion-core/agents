  - Se ejecuta gcloud ai models list para verificar acceso
  - Exito muestra log_success con confirmacion
  - Fallo muestra log_error con diagnostico y sugerencias
  - Fallo sale con exit code 5
  - En modo dry-run se muestra el comando sin ejecutar
  - Se usa log_step para mostrar "[Paso 6/7] Verificando acceso a Vertex AI..."

