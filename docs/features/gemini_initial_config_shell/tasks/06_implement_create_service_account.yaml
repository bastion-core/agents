# Phase 2 - Core Pipeline
task: implement_create_service_account
id: TASK-006
level: L2
parent: technical.yaml
status: PENDING
phase: "2 - Core Pipeline"
depends_on:
  - TASK-004
  - TASK-005

scope: |
  Implementar el paso 1 del pipeline: creacion del Service Account dedicado
  para el desarrollador.

  Flujo:
    1. Verificar si el SA gemini-{DEV_NAME} ya existe en el proyecto
       - Comando: gcloud iam service-accounts describe gemini-{DEV_NAME}@{PROJECT_ID}.iam.gserviceaccount.com
       - Si existe: log_warning y continuar (idempotencia)
    2. Si no existe, crear el SA:
       - Comando: gcloud iam service-accounts create gemini-{DEV_NAME} --project={PROJECT_ID} --display-name="Gemini Dev - {DEV_NAME}"
    3. Verificar que la creacion fue exitosa
    4. Mostrar log_success con el email del SA creado

  En modo --dry-run: mostrar el comando que se ejecutaria sin ejecutarlo.
  El SA email completo (gemini-{DEV_NAME}@{PROJECT_ID}.iam.gserviceaccount.com)
  debe almacenarse en la variable SA_EMAIL para uso en pasos posteriores.

files_to_create: []

files_to_modify:
  - scripts/setup-gemini.sh

estimated_effort: small

acceptance:
  - El SA se crea con el formato gemini-{DEV_NAME}@{PROJECT_ID}.iam.gserviceaccount.com
  - Si el SA ya existe, no se intenta recrear y se muestra warning
  - En modo dry-run se muestra el comando sin ejecutar
  - La variable SA_EMAIL queda asignada para uso en pasos posteriores
  - Se usa log_step para mostrar "[Paso 1/7] Creando Service Account..."

