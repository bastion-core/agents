       referenciar el script como solucion
     - Agregar entrada para como revertir la configuracion con --cleanup

  4. Mantener los demas pasos (1, 2, 3, 5, 6, 7) sin cambios ya que siguen
     siendo validos.

  No modificar la estructura general del README ni agregar secciones nuevas
  innecesarias. El objetivo es reemplazar el flujo manual por el automatizado.

