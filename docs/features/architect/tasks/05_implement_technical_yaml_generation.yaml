# tasks/05_implement_technical_yaml_generation.yaml
task: implement_technical_yaml_generation
phase: 2 - Core Pipeline
level: L3
parent: technical.yaml
status: TODO

scope: |
  Implementar la fase de generacion del archivo technical.yaml dentro del
  prompt del agente architect.md. Esta fase define como el agente construye
  y escribe el archivo technical.yaml con el formato de especificacion tecnica
  estandarizado. Incluye el template de salida completo con todos los campos
  obligatorios, las reglas de redaccion, la descripcion del objetivo de cada
  campo y la ruta donde guardar el archivo.

files_to_modify:
  - plugins/general/agents/architect.md

patterns:
  - output_template: incluir template completo del technical.yaml con todos los campos obligatorios (feature, layer, architecture, api_contract, pipeline, data_model, dependencies)
  - field_descriptions:
      feature: nombre en snake_case que coincide con el feature.yaml de entrada para trazabilidad
      layer: capa de la arquitectura donde se implementa (api, domain, infrastructure, agent, worker, scheduler)
      architecture: patron arquitectonico, punto de entrada, caso de uso principal, interfaces involucradas
      api_contract: contrato de API con metodo, ruta, auth, request/response schemas y errores (solo si expone endpoint)
      pipeline: flujo de procesamiento por fases con entrada/proceso/salida (solo para agentes, workers, batch)
      data_model: diagrama ER y diccionario de datos (solo si modifica modelo de datos)
      dependencies: lista de servicios, repositorios y componentes externos necesarios
  - conditional_fields: api_contract, pipeline y data_model solo se incluyen cuando la solucion lo requiere
  - file_path: escribir en docs/features/[feature_name]/technical.yaml usando Write tool
  - writing_rules:
      language: espanol para valores descriptivos, ingles para keys y nombres tecnicos
      architecture: describir sin codigo, solo alto nivel
      api_contract: tipos de dato precisos, codigos HTTP estandar
      dependencies: nombre y responsabilidad breve de cada dependencia

acceptance:
  - prompt incluye template completo del technical.yaml con ejemplo de formato
  - prompt incluye descripcion del proposito de cada campo para guiar la generacion
  - prompt indica cuales campos son condicionales y cuando incluirlos
  - prompt indica usar Write tool para guardar el archivo en la ruta correcta
  - prompt incluye reglas de redaccion para cada campo
  - template generado es compatible con el formato definido en feature.yaml outputs.primary_file

context_files:
  - docs/features/architect/feature.yaml  # outputs.primary_file con fields descriptions
  - docs/features/architect/technical.yaml  # estructura de referencia del technical.yaml
  - plugins/general/agents/architect.md  # archivo a modificar
