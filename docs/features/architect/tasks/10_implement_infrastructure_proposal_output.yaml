# tasks/10_implement_infrastructure_proposal_output.yaml
task: implement_infrastructure_proposal_output
phase: 4 - Mandatory Outputs
level: L2
parent: technical.yaml
status: DONE

scope: |
  Implementar la generacion del archivo infrastructure-proposal.md dentro del
  prompt del agente architect.md. Este archivo es una salida obligatoria que
  contiene la propuesta de arquitectura de infraestructura cloud con diagramas
  para AWS y GCP, matriz de comparacion, estimaciones de costo y recomendacion
  de proveedor. Debe integrar Kubernetes + ArgoCD como modelo de orquestacion
  estandar.

files_to_modify:
  - plugins/general/agents/architect.md

patterns:
  - mandatory_output: el agente DEBE generar este archivo al final de cada analisis completo
  - file_path: escribir en la misma carpeta del feature.yaml de entrada usando Write tool
  - content_structure:
      requirements_summary: servicios, data stores, integraciones externas, requisitos no funcionales
      orchestration: configuracion K8s (namespaces, node pools, ingress), flujo GitOps, aplicaciones ArgoCD
      aws_proposal: diagrama de infraestructura AWS en Mermaid, seleccion de servicios con justificacion, networking (VPC, subnets, AZs), estimacion de costo mensual
      gcp_proposal: diagrama de infraestructura GCP en Mermaid, seleccion de servicios con justificacion, networking (VPC, subnets, firewall), estimacion de costo mensual
      comparison_matrix: criterios ponderados (K8s management 20%, costo 25%, madurez servicios 15%, familiaridad 15%, disponibilidad regional 10%, vendor lock-in 15%)
      recommendation: proveedor seleccionado con justificacion y trade-offs
  - orchestration_model: todas las propuestas deben integrar Kubernetes + ArgoCD GitOps, no proponer alternativas (ECS, Cloud Run) salvo que el usuario lo solicite
  - service_catalogs: usar catalogos de servicios AWS y GCP definidos en technical.yaml
  - mermaid_format: diagramas de infraestructura en graph TB de Mermaid con subgraphs

acceptance:
  - prompt indica que infrastructure-proposal.md es una salida obligatoria de cada analisis
  - prompt incluye template completo del infrastructure-proposal.md con estructura y ejemplos
  - prompt incluye propuesta para AWS y GCP con diagramas Mermaid
  - prompt incluye matriz de comparacion con criterios ponderados
  - prompt incluye estimaciones de costo mensual por proveedor
  - prompt usa catalogos de servicios del technical.yaml
  - prompt indica usar Write tool para guardar el archivo

context_files:
  - docs/features/architect/technical.yaml  # infrastructure_proposal (aws, gcp, orchestration_model, comparison_criteria)
  - docs/features/architect/feature.yaml  # acceptance_criteria sobre infraestructura
  - plugins/general/agents/architect.md  # archivo a modificar (templates de infra ya existen)
