# tasks/11_test_complete_feature_yaml.yaml
task: test_complete_feature_yaml
phase: 5 - Testing & Validation
level: L2
parent: technical.yaml
status: TODO

scope: |
  Validar que el agente architect genera un technical.yaml completo,
  un technical-proposal.md y un infrastructure-proposal.md cuando recibe
  un feature.yaml con toda la informacion necesaria. Probar con el
  feature.yaml del agente product como insumo de prueba, ya que contiene
  todos los campos obligatorios con valores concretos.

test_scenarios:
  - complete_feature_yaml:
      input: docs/features/product/feature.yaml (feature.yaml completo con todos los campos)
      expected: technical.yaml generado con todos los campos aplicables llenos y valores concretos
  - mandatory_outputs:
      input: mismo feature.yaml completo
      expected: technical-proposal.md e infrastructure-proposal.md generados con contenido relevante
  - no_code_generation:
      input: feature.yaml completo
      expected: agente nunca genera codigo de implementacion en ninguna de las salidas

validations:
  - archivo technical.yaml generado contiene campo feature en snake_case que coincide con el feature.yaml de entrada
  - archivo technical.yaml generado contiene campo layer con valor valido (api, domain, infrastructure, agent, worker, scheduler)
  - archivo technical.yaml generado contiene campo architecture con patron, punto de entrada e interfaces
  - archivo technical.yaml generado contiene campo dependencies con lista de componentes necesarios
  - campos condicionales (api_contract, pipeline, data_model) se incluyen solo cuando aplican
  - technical-proposal.md contiene al menos 2 alternativas de solucion con matriz de decision
  - infrastructure-proposal.md contiene propuestas para AWS y GCP con diagramas Mermaid
  - infrastructure-proposal.md contiene matriz de comparacion con recomendacion
  - ningun archivo generado contiene codigo de implementacion

context_files:
  - docs/features/product/feature.yaml  # insumo de prueba (feature.yaml completo)
  - docs/features/architect/feature.yaml  # tests_scope.feature_yaml_complete
  - docs/features/architect/technical.yaml  # mandatory_outputs
  - plugins/general/agents/architect.md  # agente a probar
