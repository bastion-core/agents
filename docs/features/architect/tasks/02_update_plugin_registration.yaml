  - readme_update: actualizar seccion del agente architect en README.md con nuevas capacidades (input feature.yaml, output technical.yaml, diagramas condicionales, flujo de datos faltantes)

acceptance:
  - plugin.json tiene version 1.3.0
  - descripcion del architect en plugin.json menciona que acepta feature.yaml y genera technical.yaml
  - README.md describe las nuevas capacidades del architect v2.0
  - README.md incluye ejemplo de uso con feature.yaml como entrada

context_files:
