# tasks/13_test_conditional_diagrams.yaml
task: test_conditional_diagrams
phase: 5 - Testing & Validation
level: L2
parent: technical.yaml
status: TODO

scope: |
  Validar que el agente architect maneja correctamente los flujos condicionales
  de diagramas: ER (cuando hay nuevas tablas), secuencia (cuando hay multiples
  interacciones) e infraestructura (AWS/GCP). Verificar que el agente pregunta
  al usuario antes de generar cada tipo de diagrama y respeta la decision.

test_scenarios:
  - new_tables_with_er:
      input: feature.yaml que menciona nuevas tablas + usuario tiene diagrama ER existente
      expected: agente pregunta por diagrama ER, lo lee como contexto y lo usa para el data_model del technical.yaml
  - new_tables_without_er:
      input: feature.yaml que menciona nuevas tablas + no existe diagrama ER
      expected: agente genera propuesta de normalizacion con diagrama erDiagram en Mermaid y diccionario de datos
  - multiple_interactions:
      input: feature.yaml con multiples interacciones entre componentes
      expected: agente pregunta si generar diagrama de secuencia, y si acepta genera sequenceDiagram en Mermaid
  - simple_feature_no_diagrams:
      input: feature.yaml de funcionalidad simple sin nuevas tablas ni interacciones complejas
      expected: agente NO ofrece diagrama ER ni de secuencia (solo infraestructura que siempre se ofrece)
  - infrastructure_aws:
      input: usuario acepta diagrama de infraestructura y elige AWS
      expected: diagrama de infraestructura AWS en Mermaid con EKS, ArgoCD, servicios gestionados y networking
  - infrastructure_gcp:
      input: usuario acepta diagrama de infraestructura y elige GCP
      expected: diagrama de infraestructura GCP en Mermaid con GKE, ArgoCD, servicios gestionados y networking
  - infrastructure_both:
      input: usuario acepta diagrama de infraestructura y elige ambos proveedores
      expected: diagramas AWS y GCP con matriz de comparacion y recomendacion

validations:
  - agente pregunta al usuario antes de generar diagramas ER y de secuencia (no los fuerza)
  - agente detecta automaticamente cuando el feature.yaml implica cambios en modelo de datos
  - agente detecta automaticamente cuando el feature.yaml tiene multiples interacciones
  - diagramas ER generados usan sintaxis erDiagram de Mermaid valida
  - diagramas de secuencia generados usan sintaxis sequenceDiagram de Mermaid valida
  - diagramas de infraestructura integran Kubernetes + ArgoCD como base
  - agente respeta la decision del usuario si rechaza generar un diagrama
  - todos los diagramas generados usan sintaxis Mermaid valida

context_files:
  - docs/features/architect/feature.yaml  # outputs.conditional_diagrams, tests_scope
  - docs/features/architect/technical.yaml  # diagram_types, infrastructure_proposal
  - plugins/general/agents/architect.md  # agente a probar
