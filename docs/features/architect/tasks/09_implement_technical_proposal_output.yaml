# tasks/09_implement_technical_proposal_output.yaml
task: implement_technical_proposal_output
phase: 4 - Mandatory Outputs
level: L2
parent: technical.yaml
status: TODO

scope: |
  Implementar la generacion del archivo technical-proposal.md dentro del
  prompt del agente architect.md. Este archivo es una salida obligatoria
  que contiene la propuesta tecnica de solucion con diagramas de componentes,
  flujo y entidad-relacion (cada tipo de diagrama solo cuando la solucion
  lo requiere). Incluye alternativas de solucion evaluadas, matriz de
  decision, recomendacion final y plan de implementacion por fases.

files_to_modify:
  - plugins/general/agents/architect.md

patterns:
  - mandatory_output: el agente DEBE generar este archivo al final de cada analisis completo
  - file_path: escribir en la misma carpeta del feature.yaml de entrada usando Write tool
  - content_structure:
      solution_overview: problema, solucion propuesta, alcance
      component_architecture: diagrama de componentes (solo si hay 2+ componentes interactuando)
      flow_diagrams: diagramas de secuencia o flujo (solo si hay procesos multi-paso)
      data_model: diagrama ER y diccionario de datos (solo si modifica modelo de datos)
      api_design: endpoints, schemas, errores (solo si expone API)
      solution_alternatives: al menos 2-3 opciones con pros/contras y analisis de complejidad
      decision_matrix: matriz con criterios ponderados (complejidad 20%, mantenimiento 25%, escalabilidad 20%, alineacion 15%, time-to-market 10%, familiaridad 10%)
      recommendation: opcion seleccionada con justificacion y trade-offs
      implementation_phases: plan por fases con estimaciones tres-puntos
      risks: riesgos con probabilidad, impacto y mitigacion
  - diagram_rules: incluir cada tipo de diagrama SOLO cuando la solucion lo requiere, nunca forzar diagramas innecesarios
  - mermaid_format: todos los diagramas en sintaxis Mermaid

acceptance:
  - prompt indica que technical-proposal.md es una salida obligatoria de cada analisis
  - prompt incluye template completo del technical-proposal.md con estructura y ejemplos
  - prompt define reglas claras de inclusion/exclusion para cada tipo de diagrama
  - prompt incluye al menos 2-3 alternativas de solucion con matriz de decision
  - prompt indica usar Write tool para guardar el archivo
  - template incluye plan de implementacion por fases con estimaciones tres-puntos

context_files:
  - docs/features/architect/technical.yaml  # mandatory_outputs, evaluation_framework, time_estimation
  - docs/features/architect/feature.yaml  # acceptance_criteria sobre alternativas y matriz de decision
  - plugins/general/agents/architect.md  # archivo a modificar (template de technical-proposal.md ya existe)
