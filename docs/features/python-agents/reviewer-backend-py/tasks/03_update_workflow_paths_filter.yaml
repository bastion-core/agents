# tasks/03_update_workflow_paths_filter.yaml
task: update_workflow_paths_filter
phase: 1 - Agent Pipeline Update
level: L2
parent: technical.yaml
status: DONE

scope: |
  Evaluar y actualizar el filtro de paths del workflow de GitHub Actions
  (code-review-backend-py.yml) para decidir si debe ampliarse a todos
  los archivos o si el filtrado a nivel de script es suficiente.
  Actualmente el workflow solo se activa con paths: src/**/*.py,
  tests/**/*.py, requirements.txt, alembic/**, Dockerfile.
  El nuevo flujo out_of_scope requiere que el workflow se active para
  CUALQUIER PR (o al menos para paths mas amplios) para que el agente
  pueda emitir APPROVE en PRs que no tocan codigo Python. De lo contrario,
  PRs con solo archivos de configuracion o documentacion nunca disparan
  el workflow y no reciben feedback del agente.

files_to_modify:
  - git-workflows/python/code-review-backend-py.yml

patterns:
  - option_a_remove_paths: |
      Remover el filtro paths: del trigger pull_request para que el workflow
      se active con cualquier PR. El filtrado se hace en el script code-review.sh
      (Task 02) que detecta out_of_scope y termina rapido sin llamar a la API.
      Pro: cobertura completa, todo PR recibe feedback.
      Con: el workflow se ejecuta para todos los PRs (aunque el early exit es rapido).
  - option_b_expand_paths: |
      Ampliar la lista de paths para incluir archivos comunes no-Python:
      paths: ['**'] o paths: ['src/**', 'tests/**', 'scripts/**', '*.md', '*.yml', etc.]
      Pro: control granular de que PRs disparan el workflow.
      Con: si se omite un path, ese PR no recibe feedback.
  - recommended: option_a_remove_paths es la opcion recomendada porque garantiza que TODO PR reciba feedback del agente (out_of_scope o revision completa)
  - early_exit_cost: el costo de activar el workflow para PRs sin Python es minimo — solo checkout + deteccion de archivos + comentario, sin llamada a API de Claude

acceptance:
  - workflow se activa para PRs que NO contienen archivos Python
  - PRs con solo archivos de configuracion disparan el workflow
  - PRs con solo documentacion disparan el workflow
  - el script code-review.sh maneja el filtrado real (Task 02)
  - decision de paths esta justificada en un comentario en el YAML del workflow

context_files:
  - git-workflows/python/code-review-backend-py.yml  # archivo a modificar
  - docs/features/python-agents/reviewer-backend-py/technical.yaml  # out_of_scope_rule
  - scripts/code-review.sh  # script que maneja el filtrado real
