# tasks/06_implement_generation_phase.yaml
task: implement_generation_phase
phase: 2 - Agent Pipeline
level: L3
parent: technical.yaml
status: TODO

scope: |
  Implementar la Fase 3 (GenerationPhase) dentro del prompt del agente
  product.md. Esta fase define como el agente construye y escribe el
  archivo feature.yaml con el formato estandarizado. Incluye el template
  de salida completo, las reglas de redaccion y la ruta donde guardar
  el archivo.

files_to_modify:
  - plugins/general/agents/product.md

patterns:
  - output_template: incluir template completo del feature.yaml con todos los campos obligatorios (feature, owner, version, description, acceptance_criteria, business_rules, inputs, outputs, tests_scope)
  - writing_rules:
      language: espanol
      description: iniciar con "Como [rol de usuario]"
      acceptance_criteria: verificables, sin tecnologias ni frameworks
      business_rules: valores concretos con nombre clave y valor preciso
      inputs: tipados con valores permitidos explicitos
      outputs: tipados con respuestas exitosas y de error
      tests_scope: nombre_clave + descripcion breve con resultado esperado
  - file_path: escribir en docs/features/[feature_name]/feature.yaml usando Write tool
  - field_descriptions: incluir en el prompt la descripcion del objetivo de cada campo (tomada de feature.yaml outputs.campos)

acceptance:
  - prompt incluye template completo del feature.yaml con ejemplo de formato
  - prompt incluye reglas de redaccion para cada campo
  - prompt indica usar Write tool para guardar el archivo en la ruta correcta
  - prompt incluye descripcion del proposito de cada campo para guiar la generacion
  - template generado es compatible con el formato definido en feature.yaml

context_files:
  - docs/features/product/technical.yaml  # pipeline.phase_3_generation y writing_rules
  - docs/features/product/feature.yaml  # outputs.campos con descripcion de cada campo
  - plugins/general/agents/product.md  # archivo a modificar