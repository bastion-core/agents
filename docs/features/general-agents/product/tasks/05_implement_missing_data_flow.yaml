# tasks/05_implement_missing_data_flow.yaml
task: implement_missing_data_flow
phase: 2 - Agent Pipeline
level: L2
parent: technical.yaml
status: DONE

scope: |
  Implementar el flujo de datos faltantes (MissingDataRequest) dentro del
  prompt del agente product.md. Cuando la Fase 2 detecta campos faltantes,
  incompletos o ambiguos, el agente debe responder con una lista estructurada
  de los puntos que necesita para completar la especificacion. Debe usar
  AskUserQuestion cuando sea posible para facilitar la interaccion.

files_to_modify:
  - plugins/general/agents/product.md

patterns:
  - response_format: lista estructurada con campo, estado (missing/incomplete/ambiguous), detalle de que falta, y pregunta sugerida para el PO
  - ask_user: usar herramienta AskUserQuestion para hacer preguntas concretas al usuario
  - no_partial_output: nunca generar feature.yaml parcial, siempre solicitar primero los datos faltantes
  - iterative: despues de recibir respuestas, volver a ejecutar Fase 1 y Fase 2 con la nueva informacion

acceptance:
  - prompt define formato claro de respuesta para datos faltantes con campo, estado, detalle y pregunta sugerida
  - prompt indica usar AskUserQuestion para solicitar datos al usuario
  - prompt prohibe explicitamente generar archivos parciales
  - prompt indica que tras recibir datos nuevos debe re-ejecutar extraccion y validacion

context_files:
  - docs/features/product/technical.yaml  # agent_contract.insufficient_output
  - docs/features/product/feature.yaml  # business_rules.insumos_insuficientes
  - plugins/general/agents/product.md  # archivo a modificar