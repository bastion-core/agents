phase: 6 - Testing
level: L3
parent: technical.yaml
status: PENDING
depends_on: [17_implement_task_dependency_resolution]

scope: |
  Ejecutar test end-to-end del flujo completo de analisis de technical.yaml
  usando un archivo technical.yaml valido como input. El test debe verificar
  las 3 fases del flujo:

  1. FASE DE VALIDACION:
     - Proporcionar al agente architect un technical.yaml valido existente
       (ej. docs/features/python-agents/backend-py/technical.yaml)
     - Verificar que el agente detecta correctamente que es un technical.yaml (no feature.yaml)
     - Verificar que la validacion pasa sin errores
     - Verificar que el agente continua al flujo de seleccion de sub-agentes

  2. FASE DE SELECCION DE SUB-AGENTES:
     - Verificar que el agente pregunta que sub-agentes usar
     - Proporcionar sub-agentes de prueba (ej. "python-development:backend-py",
       "python-development:qa-backend-py")
     - Verificar que el agente confirma la seleccion antes de continuar

  3. FASE DE GENERACION DE TAREAS:
     - Verificar que se generan tareas en el directorio tasks/
     - Verificar que cada tarea tiene el formato correcto (task, level, parent, status,
       scope, files_to_create, patterns, acceptance, context_files)
     - Verificar que las tareas estan clasificadas por componente
     - Verificar que las dependencias entre tareas son coherentes
     - Verificar que la numeracion refleja el orden logico de ejecucion

  Documentar resultados en tests/test_valid_technical_yaml_analysis_result.md

files_to_create:
  - docs/features/general-agents/architect/tests/test_valid_technical_yaml_analysis_result.md

patterns:
  - end_to_end_test: ejecutar las 3 fases completas con input real
  - validation_checks: verificar cada criterio de aceptacion de las tareas 14-17
  - result_documentation: documentar cada verificacion con pass/fail y evidencia

acceptance:
  - el agente detecta el input como technical.yaml correctamente
  - la validacion del schema pasa sin errores para un archivo valido
  - el agente solicita sub-agentes y acepta la seleccion del usuario
  - se generan archivos de tarea en el directorio tasks/ correcto
  - cada tarea generada cumple con el schema obligatorio
  - las dependencias entre tareas son logicas y sin ciclos
  - el resultado del test se documenta en el archivo de resultados

context_files:
  - docs/features/python-agents/backend-py/technical.yaml  # input de prueba
  - docs/features/general-agents/architect/technical.yaml  # reglas a verificar
  - plugins/general/agents/architect.md  # agente bajo prueba
