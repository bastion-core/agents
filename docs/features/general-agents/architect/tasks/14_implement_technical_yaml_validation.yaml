# tasks/14_implement_technical_yaml_validation.yaml
task: implement_technical_yaml_validation
phase: 5 - Technical YAML Analysis
level: L3
parent: technical.yaml
status: PENDING

scope: |
  Agregar una nueva seccion en el prompt del agente architect.md que implemente
  la validacion de archivos technical.yaml existentes. Cuando el usuario solicite
  analizar un technical.yaml (en lugar de un feature.yaml), el agente debe:
  1. Detectar que el input es un technical.yaml (no un feature.yaml)
  2. Leer el archivo con Read tool
  3. Validar campos obligatorios: feature (snake_case), layer (enum valido)
  4. Validar secciones obligatorias: architecture (pattern, entry), dependencies
  5. Validar secciones condicionales segun el valor de layer:
     - api_contract: si expone endpoint HTTP (method, path, auth, request, response)
     - pipeline: si es agente, worker o batch (input, process, output por fase)
     - data_model: si modifica modelo de datos (er_diagram, data_dictionary)
     - agent_contract: si layer=agent (invocation, tools, inputs, success_output)
  6. Si la validacion falla, reportar campos faltantes con formato estructurado
     (campo, status: missing|incomplete|invalid_format, expected) y detener el flujo
  7. Si la validacion pasa, continuar al flujo de seleccion de sub-agentes

  Esta seccion debe coexistir con el flujo existente de feature.yaml sin romperlo.
  El agente debe detectar automaticamente el tipo de input basandose en el contenido
  del archivo (presencia de acceptance_criteria indica feature.yaml, presencia de
  architecture indica technical.yaml).

files_to_modify:
  - plugins/general/agents/architect.md

patterns:
  - input_detection: detectar tipo de archivo por contenido (feature.yaml vs technical.yaml)
  - validation_schema: validar contra el minimum_schema definido en technical.yaml spec
  - conditional_validation: secciones condicionales segun layer y contexto
  - error_reporting: formato estructurado para campos faltantes (campo, status, expected)
  - flow_branching: flujo feature.yaml existente intacto, nuevo branch para technical.yaml

acceptance:
  - el agente detecta automaticamente si el input es feature.yaml o technical.yaml
  - valida los 2 campos obligatorios (feature, layer) con sus restricciones
  - valida las 2 secciones obligatorias (architecture, dependencies) con sus keys requeridas
  - valida secciones condicionales solo cuando aplican segun el contexto
  - reporta errores de validacion con formato estructurado sin generar tareas
  - continua al flujo de sub-agentes cuando la validacion pasa
  - el flujo existente de feature.yaml sigue funcionando sin cambios

context_files:
  - docs/features/general-agents/architect/technical.yaml  # seccion technical_yaml_analysis.validation
  - plugins/general/agents/architect.md  # archivo a modificar