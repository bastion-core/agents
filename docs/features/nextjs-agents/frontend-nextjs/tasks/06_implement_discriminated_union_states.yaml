scope: |
  Agregar la seccion de Discriminated Union States al agente frontend-nextjs.md.
  Cubrir la seccion patterns.state_pattern del technical.yaml.

  Este patron define como se modelan los estados de la UI en el domain layer
  usando discriminated unions con campo 'kind'. Es CRITICO porque define
  la interfaz entre stores y componentes.

  1. Template del estado:
     - Loading{Module}State: { kind: 'Loading{Module}State' }
     - Loaded{Module}State: { kind: 'Loaded{Module}State', data: Entity[], totalRows?: number }
     - Error{Module}State: { kind: 'Error{Module}State', serviceError: ServiceError }
     - Union type: type {Module}State = Loading | Loaded | Error

  2. Constantes KIND:
     - LOADING_KIND = 'Loading{Module}State'
     - LOADED_KIND = 'Loaded{Module}State'
     - ERROR_KIND = 'Error{Module}State'

  3. Reglas:
     - Siempre usar campo 'kind' como discriminador
     - Definir constantes para los valores de kind (evitar magic strings)
     - Verificar con state.kind === LOADED_KIND (no instanceof)
     - Cada estado tiene SOLO los campos relevantes para ese estado
     - Los states viven en domain/states/

  4. Tipo de archivo: PascalCase.ts (ej: DriversState.ts)
  5. Ubicacion: src/core/{module}/domain/states/

  Incluir template completo con interfaces separadas, constantes KIND y union type.
  Este patron es prerequisito para los stores Zustand y los componentes UI.

files_to_modify:
  - plugins/nextjs-development/agents/frontend-nextjs.md

patterns:
  - discriminated_union: union type con campo 'kind' como discriminador
  - kind_constants: LOADING_KIND, LOADED_KIND, ERROR_KIND como constantes
  - state_interfaces: interfaces separadas por cada estado (Loading, Loaded, Error)
  - type_narrowing: state.kind === LOADED_KIND para type narrowing seguro
  - state_location: domain/states/ como ubicacion estandar

acceptance:
