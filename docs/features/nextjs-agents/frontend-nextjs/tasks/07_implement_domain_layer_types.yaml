# tasks/07_implement_domain_layer_types.yaml
task: implement_domain_layer_types
phase: 4 - Domain Layer Patterns
level: L2
parent: technical.yaml
status: PENDING
depends_on: [03_implement_folder_structure, 04_implement_coding_standards]
assigned_subagent: nextjs-development:frontend-nextjs

scope: |
  Agregar la seccion de Domain Layer Types al agente frontend-nextjs.md.
  Cubrir los subdirectorios del domain layer del technical.yaml que no son
  states (cubiertos en tarea 06) ni either (cubierto en tarea 05):

  1. Entities (domain/entities/):
     - Tipos TypeScript puros que representan entidades del dominio
     - Nombrados en PascalCase (Driver.ts, Vehicle.ts)
     - Sin dependencias externas (logica pura)
     - Tipos con type o interface (no clases)

  2. DTOs (domain/dtos/):
     - Data Transfer Objects para requests y responses
     - Nombrados en PascalCase con sufijo Dto (GetDriversDto.ts, CreateDriverDto.ts)
     - Definen la forma de los datos que viajan entre capas

  3. Enums (domain/enums/):
     - String enums para valores de dominio
     - Ejemplo: enum DriverStatus { ACTIVE = 'ACTIVE', INACTIVE = 'INACTIVE' }
     - Nombrados en PascalCase (DriverStatus.ts)

  4. Consts (domain/consts/):
     - Constantes del dominio
     - Nombradas en UPPER_SNAKE_CASE
     - Valores inmutables del dominio

  5. Regla general del domain layer:
     - ZERO dependencias en React, Next.js, Zustand, Axios
     - Solo puede importar de domain/ del mismo modulo y @core/common/domain
     - Tipos puros: no clases con metodos, no side effects

files_to_modify:
  - plugins/nextjs-development/agents/frontend-nextjs.md

patterns:
  - entities: TypeScript types/interfaces puros para entidades de dominio
  - dtos: tipos para data transfer entre capas
  - enums: string enums para valores de dominio
  - consts: constantes UPPER_SNAKE_CASE del dominio
  - pure_domain: zero dependencias externas en el domain layer

acceptance:
  - prompt incluye guia para crear entities con ejemplo
  - prompt incluye guia para crear DTOs con ejemplo de request y response
  - prompt incluye guia para crear string enums con ejemplo
  - prompt incluye guia para crear constantes de dominio
  - prompt refuerza regla de ZERO dependencias externas en domain
  - prompt indica naming conventions para cada tipo de archivo
  - prompt indica que usar type o interface (no clases) para entities

