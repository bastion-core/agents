scope: |
  Crear el archivo base del agente frontend-nextjs.md en plugins/nextjs-development/agents/.
  Incluir el frontmatter YAML (name, description, model, color) y la seccion de introduccion
  del agente que define su rol, expertise y mision. Cubrir las secciones del technical.yaml:

  - agent_contract: definir el agente como especialista Next.js con Two-layer Architecture
  - agent_description: name, version 2.0.0, purpose, scope, usage_instructions
  - Rol principal: implementar funcionalidades Next.js siguiendo Domain + Infrastructure pattern
  - Herramientas disponibles: Read, Write, Edit, Glob, Grep, Bash
  - Inputs esperados: technical_yaml, user_instruction, project_codebase
  - Output esperado: implementacion completa por capas (domain + infrastructure + app)
  - Adaptabilidad: patrones agnosticos a version del framework

  Incluir la seccion de Technology Stack Expertise basada en stack.required y
  stack.recommended del technical.yaml:
  - Core: Next.js 13+ (App Router), TypeScript strict, React 18+, Zustand, Tailwind CSS v4
  - Forms: React Hook Form + Zod
  - HTTP: Axios
  - Testing: Vitest + @testing-library/react
  - Recommended: shadcn/ui, next-intl, TanStack Table, Recharts, Leaflet, date-fns, lucide-react

  Tomar como referencia la estructura del backend-py.md para el formato y tono del agente.
  El frontmatter debe seguir el formato:
  ---
  name: frontend-nextjs
  description: Frontend Next.js Development Agent...
  model: inherit
  color: blue
  ---

