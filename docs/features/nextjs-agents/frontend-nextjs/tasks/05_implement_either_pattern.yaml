scope: |
  Agregar la seccion de Either Monad (Functional Error Handling) al agente frontend-nextjs.md.
  Cubrir la seccion patterns.either_pattern del technical.yaml.

  Este es un patron CRITICO porque es la base del manejo de errores en todo el frontend.
  Los DataAccess NUNCA lanzan excepciones. Retornan Either<ServiceError, ServiceSuccess<T>>.

  1. Descripcion del patron:
     - Either monad como patron funcional para manejo de errores
     - Location: @core/common/domain/Either.ts
     - Tipos: Either<ServiceError, ServiceSuccess<T>>

  2. Uso en DataAccess:
     - handleRequest<T>() envuelve todas las llamadas HTTP
     - Retorna Either con left (error) o right (success)
     - NUNCA usar try/catch en data access para errores de API

  3. Uso en stores:
     - response.fold() para manejar ambos caminos
     - fold(onError, onSuccess) con set() de estado
     - ServiceError incluye: code, message, description

  4. Reglas:
     - NUNCA usar try/catch en data access para errores de API
     - handleRequest<T> envuelve TODAS las llamadas HTTP
     - fold() para manejar ambos caminos (error/success)
     - ServiceError incluye: code, message, description

  Incluir templates de uso tanto en DataAccess como en stores.
  Este patron es prerequisito para las tareas de DataAccess y stores.

