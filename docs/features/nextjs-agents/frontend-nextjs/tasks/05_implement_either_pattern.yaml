patterns:
  - either_monad: Either<ServiceError, ServiceSuccess<T>> como tipo de retorno
  - handle_request: handleRequest<T>() envuelve llamadas HTTP
  - fold: response.fold(onError, onSuccess) para bifurcar
  - no_try_catch: NUNCA try/catch en data access
  - service_error: ServiceError con code, message, description

