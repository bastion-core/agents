# tasks/19_implement_development_workflow.yaml
task: implement_development_workflow
phase: 11 - Workflow
level: L3
parent: technical.yaml
status: PENDING
depends_on: [08_implement_data_access_pattern, 10_implement_zustand_store_pattern, 12_implement_component_pattern, 16_implement_i18n_rules]
assigned_subagent: nextjs-development:frontend-nextjs

scope: |
  Agregar la seccion de Development Workflow al agente frontend-nextjs.md.
  Cubrir las secciones pipeline y workflow del technical.yaml.

  1. Pipeline de desarrollo (9 pasos secuenciales del agente):

     step_1: Analyze existing - explorar implementaciones similares en codebase
     - Buscar patrones en stores (src/core/*/infrastructure/store/)
     - Buscar DataAccess (src/core/*/infrastructure/data-access/)
     - Buscar componentes UI (src/core/*/infrastructure/ui/)
     - Buscar domain types (src/core/*/domain/)
     - Verificar componentes compartidos en src/core/common/

     step_2: Understand domain - identificar modulo, entities, DTOs, stores existentes
     step_3: Design - definir types, DataAccess, stores, flujo de datos
     step_4: Implement domain - entities, DTOs, states, enums, constantes
     step_5: Implement infrastructure - DataAccess, stores, helpers, services
     step_6: Implement UI - screens, paginas, componentes, hooks
     step_7: Implement i18n - traducciones es.json y en.json
     step_8: Implement tests - domain, stores, UI tests
     step_9: Validate - lint, vitest, build, hexagonal-architecture plugin

  2. Git workflow:
     - Commits: Commitizen con cz-emoji-conventional (npm run cm)
     - Pre-commit: Husky + lint-staged (Prettier, ESLint, hexagonal-architecture)
     - Branch strategy: main (production), develop (staging), feature/{ticket-id}-{desc}

  Similar al "Development Workflow" del backend-py.md pero adaptado al pipeline
  del frontend Next.js.

files_to_modify:
  - plugins/nextjs-development/agents/frontend-nextjs.md

patterns:
  - analyze_first: SIEMPRE explorar codebase antes de escribir codigo
  - sequential_pipeline: 9 pasos secuenciales de implementacion
  - domain_first: implementar domain antes de infrastructure
  - validate_last: validacion con lint, tests y build al final
  - commitizen: formato de commits con cz-emoji-conventional
  - branch_strategy: main/develop/feature/{ticket-id}-{desc}

acceptance:
  - prompt incluye los 9 pasos del pipeline con descripcion clara de cada uno
  - prompt enfatiza SIEMPRE analizar codebase existente primero (step 1)
  - prompt indica orden: domain -> infrastructure -> UI -> i18n -> tests -> validate
  - prompt incluye los comandos de validacion (lint, vitest, build)
  - prompt incluye formato de commits con Commitizen
  - prompt incluye branch strategy (main, develop, feature/)
  - prompt incluye pre-commit hooks (Husky + lint-staged)

