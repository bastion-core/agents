scope: |
  Agregar la seccion de Component Pattern al agente frontend-nextjs.md.
  Cubrir la seccion patterns.component_pattern del technical.yaml.

  Define como se construyen los componentes React en la arquitectura.

  1. Template del componente:
     - 'use client' SOLO cuando el componente usa hooks, eventos o estado
     - import useTranslations de next-intl
     - import store con selector especifico
     - import constantes KIND del domain/states/
     - Props definidas con interface (no type alias para props)
     - Verificar state.kind antes de acceder a datos
     - Estilos con clases Tailwind, usar cn() para condicionales

  2. Reglas:
     - 'use client' SOLO cuando necesario (hooks, eventos, estado)
     - Props definidas con interface (no type alias)
     - Texto visible SIEMPRE via useTranslations() (nunca hardcoded)
     - Estado del store via selectores especificos (no desestructurar todo)
     - Verificar state.kind antes de acceder a datos
     - Estilos con clases Tailwind, usar cn() para condicionales
     - Exportar como default para paginas, named para componentes reutilizables

  3. Patron de consumo de store:
     const { dataState } = useModuleStore((s) => ({
       dataState: s.dataState,
     }))
     NO hacer: const { everything } = useModuleStore()

  4. Patron de type narrowing con kind:
     if (dataState.kind === ERROR_KIND) return <ErrorHandler ... />
     const data = dataState.kind === LOADED_KIND ? dataState.data : []

