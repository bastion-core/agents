phase: 13 - Integration Tests
level: L5
parent: technical.yaml
status: PENDING
depends_on: [20_implement_new_feature_checklist, 22_implement_testing_ui_and_mocks, 23_implement_response_format_and_review_checklist]
assigned_subagent: nextjs-development:frontend-nextjs

scope: |
  Validar que el agente frontend-nextjs.md genera una funcionalidad completa
  siguiendo todos los patrones definidos. Ejecutar el agente con un feature
  de ejemplo (ej: "modulo de drivers con listado, detalle y creacion") y
  verificar que el output cumple con todos los criterios.

  Criterios de validacion:

  1. Estructura de archivos:
     - Crea src/core/{module}/domain/ con entities, dtos, states, enums, consts
     - Crea src/core/{module}/infrastructure/ con data-access, store, ui
     - Crea src/app/[locale]/{feature}/page.tsx como wrapper minimo
     - Tests colocados junto a archivos fuente

  2. Domain layer:
     - Entities con TypeScript types puros (sin dependencias externas)
     - DTOs para requests y responses
     - Discriminated union states con campo 'kind' y constantes KIND
     - State y Actions interfaces separadas para stores

  3. Infrastructure layer:
     - DataAccess con handleRequest<T>(), apiAuth, originalMethod()
     - DataAccess retorna Either<ServiceError, ServiceSuccess<T>>
     - Stores con create de Zustand, DataAccess a nivel de modulo
     - Stores divididos por concern (~60-100 lineas)
     - response.fold() directo en acciones
     - Boolean loading flags

  4. UI layer:
     - Screen component que orquesta carga (useEffect)
     - Componentes con 'use client' solo cuando necesario
     - Texto via useTranslations() (no hardcoded)
     - Selectores especificos para stores
     - state.kind === CONSTANT para type narrowing

  5. Tests:
     - Domain tests puros sin mocks
     - Store tests con vi.mock() de DataAccess
     - UI tests con render custom de test-utils

  6. i18n:
     - Traducciones en es.json y en.json con estructura {feature}.{section}.{key}

  7. Anti-patrones evitados:
     - NO application layer
     - NO UseCase ni Ploc
     - NO try/catch en DataAccess
     - NO fat stores (500+ lineas)
     - NO hardcoded text

files_to_modify: []  # Esta tarea es de validacion, no modifica archivos

patterns:
  - full_feature_generation: validar generacion completa de feature
  - pattern_compliance: verificar cumplimiento de todos los patrones
  - anti_pattern_avoidance: verificar que no genera anti-patrones

acceptance:
  - agente genera estructura completa domain/ + infrastructure/ + app/
  - domain layer no tiene imports de React, Next.js, Zustand ni Axios
  - DataAccess usa handleRequest<T>() y retorna Either
  - stores divididos por concern con fold() directo
  - componentes usan useTranslations() para texto visible
  - tests incluyen domain puros, store con mocks, UI con testing library
  - traducciones en ambos archivos es.json y en.json
  - NO genera application layer, UseCase, Ploc ni capas intermedias
  - NO genera try/catch en DataAccess
  - NO genera fat stores (500+ lineas)

context_files:
