scope: |
  Agregar las secciones de Service Pattern y Helpers Pattern al agente frontend-nextjs.md.
  Cubrir las secciones patterns.service_pattern y patterns.helpers_pattern del technical.yaml.

  1. Service Pattern (infrastructure/services/):
     - Servicios con logica de negocio REAL (no solo llamadas HTTP)
     - Ejemplo valido: DraftsService que maneja localStorage, auto-save, parseo
     - Ejemplo invalido: un wrapper que solo llama apiAuth.get()
     - Regla clave: Si solo es fetch/post -> usar DataAccess. Si hay logica -> usar Service.
     - Template: clase con constructor que recibe dependencias, metodos con logica real

  2. Helpers Pattern (infrastructure/helpers/):
     - Funciones PURAS para patrones que se repiten 3+ veces dentro del modulo
     - Nombradas en camelCase (normalizeResponse.ts)
     - Sin side effects
     - Template: funcion pura exportada con tipo generico si aplica
     - Ejemplo: normalizeResponse<T>() para normalizar success.data (array vs object)

  3. Criterios de decision:
     - Solo HTTP -> DataAccess
     - Logica real (localStorage, auto-save, parseo, etc.) -> Service
     - Patron repetido 3+ veces -> Helper
     - Logica simple no repetida -> inline en el store

