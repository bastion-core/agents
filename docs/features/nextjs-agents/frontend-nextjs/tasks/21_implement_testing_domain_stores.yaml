depends_on: [05_implement_either_pattern, 10_implement_zustand_store_pattern, 08_implement_data_access_pattern]
assigned_subagent: nextjs-development:frontend-nextjs

scope: |
  Agregar las secciones de Testing para Domain y Store al agente frontend-nextjs.md.
  Cubrir las secciones testing.layers.domain_tests, testing.layers.store_tests
  y testing.layers.data_access_tests del technical.yaml.

  Esta es una seccion CRITICA y extensa que cubre las capas de testing mas importantes.

  1. Framework y ubicacion:
     - Vitest + @testing-library/react
     - Tests colocados junto al archivo fuente ({File}.test.ts(x))
     - Comandos: npx vitest run, npx vitest (watch), npx vitest run --coverage

  2. Domain tests (90%+ coverage):
     - Tests PUROS sin dependencias externas ni mocks
     - Que testar: transformaciones de datos, validaciones, Either operations, utilidades
     - Template con describe, it, expect
     - Cubrir casos edge (null, undefined, arrays vacios)
     - Testar ambos caminos de Either (left/right)

  3. Store tests (70%+ coverage):
     - Tests de acciones con DataAccess mockeado via vi.mock()
     - Que testar: acciones exitosas, errores, transiciones loading, reset
     - Template completo con:
       - vi.mock('../data-access', ...) para mockear DataAccess
       - MockImplementation con vi.fn() para cada metodo
       - beforeEach con reset del store via act()
       - Test de exito: verificar items, isLoading
       - Test de error: verificar items vacios, isLoading false
       - Usar act() de @testing-library/react para envolver actualizaciones
       - Patron de mockResponse con fold() manual

  4. DataAccess tests (60%+ coverage):
     - Testar construccion correcta de URLs
     - Testar manejo de errores HTTP
     - Testar transformacion de respuestas

  5. Coverage targets:
     - domain: 90%+ (logica pura, facil de testar)
     - stores: 70%+ (acciones con DataAccess mockeado)
     - infrastructure services: 60%+
     - ui components: 50%+
     - Priorizar coverage en domain y stores

files_to_modify:
