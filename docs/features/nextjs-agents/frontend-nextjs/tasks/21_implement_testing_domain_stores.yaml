patterns:
  - domain_pure_tests: tests sin mocks, logica pura
  - store_mock_pattern: vi.mock() para DataAccess, act() para state updates
  - fold_mock: mockResponse con fold() manual para simular Either
  - before_each_reset: reset store state entre tests
  - either_testing: testar ambos caminos left/right
  - coverage_targets: 90% domain, 70% stores, 60% services, 50% UI

