scope: |
  Agregar la seccion de DataAccess Pattern al agente frontend-nextjs.md.
  Cubrir la seccion patterns.data_access_pattern del technical.yaml.

  Este patron es CRITICO porque define como se hacen TODAS las llamadas HTTP.
  Es una clase concreta (sin interface en domain) que usa axios con interceptor.

  1. Template del DataAccess:
     - Clase concreta en infrastructure/data-access/
     - Constructor recibe baseApiUrl: string
     - apiUrl construido como ${baseApiUrl}{resource}/
     - Metodo privado originalMethod() para identificar origen en logs
     - Metodos async que retornan Promise<Either<ServiceError, ServiceSuccess<T>>>
     - Usa handleRequest<T>() para envolver llamadas HTTP
     - Usa apiAuth (axios con interceptor Bearer token)

  2. Metodos tipicos:
     - getAll(params?): listado con filtros
     - getById(id): detalle por ID
     - create(dto): creacion
     - update(id, dto): actualizacion
     - delete(id): eliminacion

  3. Reglas:
     - Clase concreta -- SIN interface en domain (no es un port)
     - Usar handleRequest<T>() para ENVOLVER llamadas HTTP
     - baseApiUrl inyectado via constructor
     - Usar apiAuth (axios con interceptor Bearer token)
     - Para uploads multipart, usar FormData
     - originalMethod() para identificar el origen en logs de error
     - Trailing slash obligatorio en todas las URLs

  4. Ubicacion del apiAuth: @core/common/infrastructure/connections/ApiConnection.ts
  5. Ubicacion del handleRequest: @core/common/infrastructure/services/RequestHelper.ts

  Incluir template completo con ejemplo basado en el technical.yaml.

