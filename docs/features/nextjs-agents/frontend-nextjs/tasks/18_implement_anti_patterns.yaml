assigned_subagent: nextjs-development:frontend-nextjs

scope: |
  Agregar la seccion de Anti-Patterns al agente frontend-nextjs.md.
  Cubrir la seccion anti_patterns del technical.yaml completa.

  1. Over-engineering anti-patterns (10 patrones PROHIBIDOS):

     a. Abstract Base Classes innecesarias
        -> Composicion sobre herencia. Usar interfaces simples.

     b. Generic CRUD Abstractions prematuras (BaseCrudService<T>)
        -> Cada DataAccess implementa sus metodos especificos.

     c. Deep inheritance hierarchies
        -> Maximo 1 nivel. Preferir composicion y factory functions.

     d. Fat stores (500+ lineas)
        -> Dividir por concern: useListStore, useDetailStore, useFormStore.

     e. Use cases layer en frontend
        -> Stores llaman DataAccess directamente. No UseCase classes.

     f. Application layer en frontend
        -> Dos capas: domain + infrastructure. No Ploc, Command, DI factories.

     g. Unnecessary middleware layers
        -> Cadena: Component -> Store -> DataAccess. Sin capas intermedias.

     h. DI framework overhead (InversifyJS, tsyringe)
        -> DataAccess instanciado a nivel de modulo con new DataAccess(baseApiUrl).

     i. Premature optimization (React.memo, useMemo, useCallback sin medir)
        -> Optimizar solo cuando hay problema medible.

     j. Over-testing implementation details
        -> Testar comportamiento visible del componente.

  2. Code smells (9 smells):
     - any type -> usar unknown y type guards
     - Magic strings -> usar constantes o enums
     - Hardcoded text -> usar useTranslations()
     - Direct API calls in components -> usar store -> DataAccess
     - Business logic in components -> extraer a hooks o helpers
     - Mutating state directly -> usar set() de Zustand
     - Importing from other module's infrastructure -> usar domain types
     - console.log in production -> usar logger service
     - Nested ternaries -> extraer a funciones o early returns

  Cada anti-patron debe tener un NEVER explicito y la alternativa correcta.

