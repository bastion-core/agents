scope: |
  Agregar la seccion de Zustand Store Pattern al agente frontend-nextjs.md.
  Cubrir la seccion patterns.store_pattern del technical.yaml.

  Este es uno de los patrones MAS CRITICOS del agente porque define como se manejan
  todos los estados y acciones async en la aplicacion. Los stores son el nucleo
  de la capa infrastructure y orquestan el flujo DataAccess -> State.

  1. Template completo del store:
     - import create from 'zustand'
     - import baseApiUrl desde @core/common/infrastructure/services/apiEndpoints
     - import types de estado de domain/states/
     - import DataAccess de infrastructure/data-access/
     - DataAccess instanciado a nivel de modulo (fuera del store): const dataAccess = new DataAccess(baseApiUrl)
     - create<StoreState & StoreActions>((set, get) => ({ ... }))

  2. Reglas CRITICAS del store:
     - Multiples stores por modulo, divididos por concern (list, detail, form)
     - DataAccess instanciado FUERA del store, a nivel de modulo
     - State y Actions en interfaces SEPARADAS (en domain/states/)
     - Stores llaman DataAccess directamente (NO Ploc, NO UseCase)
     - response.fold() DIRECTO en las acciones del store
     - Boolean loading flags (isLoadingList, isLoadingDetail, etc.)
     - UI orquesta carga inicial (useEffect en screens)
     - Cross-store: useOtherStore.getState().action()
     - set() para actualizar estado (inmutable)
     - Consumir en componentes con selectores: useStore((s) => ({ field: s.field }))

  3. Tamano ideal: ~60-100 lineas por store. Si crece mas, dividir por concern.

  4. Ejemplo de accion con fold:
     loadItems: async () => {
       set({ isLoadingList: true })
       const response = await dataAccess.getAll(get().queryParams)
       response.fold(
         (error) => set({ isLoadingList: false, items: [] }),
         (success) => {
           const data = Array.isArray(success.data) ? success.data[0] : success.data
           set({ isLoadingList: false, items: data.list || [] })
         }
       )
     }

  5. Reset pattern: reset: () => set({ items: [], isLoadingList: false, pagination: null })

