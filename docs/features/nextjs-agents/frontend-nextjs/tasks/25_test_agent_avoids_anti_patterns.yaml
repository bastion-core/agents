# tasks/25_test_agent_avoids_anti_patterns.yaml
task: test_agent_avoids_anti_patterns
phase: 13 - Integration Tests
level: L5
parent: technical.yaml
status: PENDING
depends_on: [24_test_agent_generates_complete_feature]
assigned_subagent: nextjs-development:frontend-nextjs

scope: |
  Validar que el agente frontend-nextjs.md RECHAZA o EVITA anti-patrones cuando
  el usuario los solicita. Ejecutar el agente con prompts que intencionalmente
  solicitan anti-patrones y verificar que el agente los corrige o advierte.

  Escenarios de prueba:

  1. Solicitar crear un UseCase layer:
     -> Agente debe indicar que stores llaman DataAccess directamente
     -> NO debe generar classes UseCase ni Interactor

  2. Solicitar crear una application/ layer con Ploc:
     -> Agente debe indicar Two-layer Architecture (domain + infrastructure)
     -> NO debe generar carpeta application/ ni Ploc

  3. Solicitar fat store con 500+ lineas:
     -> Agente debe dividir en multiples stores por concern
     -> Cada store ~60-100 lineas

  4. Solicitar try/catch en DataAccess:
     -> Agente debe usar handleRequest<T>() y Either
     -> NO debe generar try/catch para errores de API

  5. Solicitar texto hardcoded en componentes:
     -> Agente debe usar useTranslations()
     -> NO debe dejar strings hardcoded en JSX

  6. Solicitar 'any' types:
     -> Agente debe usar unknown con type guards
     -> NO debe usar any

  7. Solicitar DI framework (InversifyJS):
     -> Agente debe instanciar DataAccess a nivel de modulo
     -> NO debe usar framework de DI

  8. Solicitar interface para DataAccess en domain:
     -> Agente debe indicar que DataAccess es clase concreta sin interface
     -> NO debe crear interface/port en domain para DataAccess

  9. Solicitar imports cruzados entre infrastructure de modulos:
     -> Agente debe indicar que se usan domain types
     -> NO debe importar infrastructure/ de otros modulos

  10. Solicitar React.memo en todos los componentes:
      -> Agente debe indicar medir primero
      -> NO debe memoizar por defecto

files_to_modify: []  # Esta tarea es de validacion, no modifica archivos

patterns:
  - anti_pattern_rejection: agente rechaza o corrige anti-patrones
  - correct_alternative: agente propone alternativa correcta
  - educational_response: agente explica por que es anti-patron

acceptance:
  - agente NO genera UseCase ni Interactor classes cuando se solicitan
  - agente NO genera application/ layer ni Ploc
  - agente divide stores grandes en multiples stores por concern
  - agente usa handleRequest<T>() y Either en vez de try/catch
  - agente usa useTranslations() en vez de texto hardcoded
  - agente usa unknown en vez de any
  - agente NO usa framework de DI
  - agente NO crea interface para DataAccess en domain
  - agente NO importa infrastructure/ de otros modulos
  - agente NO memoiza por defecto sin medicion

