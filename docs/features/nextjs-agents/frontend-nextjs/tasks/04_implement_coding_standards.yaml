# tasks/04_implement_coding_standards.yaml
task: implement_coding_standards
phase: 3 - Coding Standards
level: L2
parent: technical.yaml
status: PENDING
depends_on: [01_create_agent_foundation]
assigned_subagent: nextjs-development:frontend-nextjs

scope: |
  Agregar la seccion de Coding Standards al agente frontend-nextjs.md.
  Cubrir la seccion coding_standards del technical.yaml:

  1. TypeScript rules:
     - strict mode obligatorio
     - no_any: evitar 'any', usar 'unknown' cuando el tipo no es conocido
     - discriminated_unions: usar para estados con campo 'kind'
     - enums: string enums para valores de dominio
     - generics: para utilidades reutilizables (Either<E,A>, handleRequest<T>)

  2. Formatting (Prettier):
     - semicolons: false
     - quotes: single
     - indent: 2
     - line_width: 80
     - bracket_same_line: false
     - single_attribute_per_line: true
     - trailing_comma: es5

  3. Naming conventions (archivos y variables):
     Archivos:
     - components: PascalCase.tsx (DriverCard.tsx)
     - hooks: camelCase.ts (useDriversPreview.ts)
     - data_access: PascalCase.ts (DriversDataAccess.ts)
     - services: PascalCase.ts (DriversService.ts)
     - helpers: camelCase.ts (normalizeResponse.ts)
     - stores: PascalCase.ts (DriversStore.ts)
     - types/entities: PascalCase.ts (Driver.ts)
     - dtos: PascalCase.ts (GetDriversDto.ts)
     - tests: PascalCase.test.ts(x) colocado junto al archivo fuente

     Variables:
     - components: PascalCase
     - hooks: camelCase con prefijo 'use'
     - constants: UPPER_SNAKE_CASE
     - types: PascalCase
     - stores: camelCase con prefijo 'use'
     - functions: camelCase
     - private_fields: camelCase (sin prefijo _)

  4. Import order:
     - React / Next.js imports
     - Third-party libraries
     - Path alias imports (@core/*, @ui/*, etc.)
     - Relative imports
     - Type imports (import type { })

files_to_modify:
  - plugins/nextjs-development/agents/frontend-nextjs.md

patterns:
  - typescript_strict: reglas de TypeScript strict con no_any y generics
  - formatting: configuracion de Prettier completa
  - naming_files: convenciones de nombrado para cada tipo de archivo
  - naming_variables: convenciones de nombrado para cada tipo de variable
  - import_order: orden estandar de imports con 5 categorias

acceptance:
