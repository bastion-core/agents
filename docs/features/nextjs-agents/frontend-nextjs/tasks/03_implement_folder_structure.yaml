  - prompt indica que services solo se crean con logica real
  - prompt indica que stores son pequenos (~60-100 lineas)
  - prompt incluye path aliases (~/, @ui/, @components/, @core/, public/)
  - prompt menciona src/core/common/ como ubicacion de codigo compartido

