phase: 7 - UI Layer
level: L2
parent: technical.yaml
status: PENDING
depends_on: [12_implement_component_pattern]
assigned_subagent: nextjs-development:frontend-nextjs

scope: |
  Agregar las secciones de Custom Hook Pattern y Page Pattern al agente frontend-nextjs.md.
  Cubrir las secciones patterns.hook_pattern y patterns.page_pattern del technical.yaml.

  1. Custom Hook Pattern (infrastructure/ui/hooks/):
     Template con estructura interna ordenada:
     - 1. Estado local (useState)
     - 2. Store integration (useStore con selectores)
     - 3. Computed values (useMemo para derivados costosos)
     - 4. Side effects (useEffect)
     - 5. Handlers (useCallback para handlers pasados como props)
     - 6. Return object (no array, para mejor legibilidad)

     Reglas:
     - Prefijo 'use' obligatorio
     - Colocar en infrastructure/ui/hooks/
     - useMemo para computaciones derivadas costosas
     - useCallback para handlers pasados como props
     - useRef para flags de inicializacion (evitar dobles llamadas)
     - Retornar objeto (no array)

  2. Page Pattern (App Router):
     Template minimo:
     - Paginas son wrappers minimos que importan Screen components
     - Screen components viven en infrastructure/ui/screens/
     - NO poner logica de negocio en paginas
     - Usar dynamic routes con [param] para IDs

     Ejemplo:
     - src/app/[locale]/{feature}/page.tsx -> importa {Feature}Screen
     - src/app/[locale]/{feature}/[id]/page.tsx -> importa {Feature}DetailScreen

  3. Screen Pattern (infrastructure/ui/screens/):
     - Componentes pantalla que orquestan la carga inicial (useEffect)
     - Componen stores, hooks y componentes del modulo
     - Son el punto de entrada visual del feature

