scope: |
  Agregar la seccion de Architecture Understanding al agente frontend-nextjs.md.
  Cubrir la seccion architectural_patterns del technical.yaml. Esta es una seccion
  CRITICA porque establece las reglas fundamentales que todas las demas secciones
  del agente deben respetar.

  1. Patron principal: Two-layer Architecture (Domain + Infrastructure)
  2. Enforcement: eslint-plugin-hexagonal-architecture (error level)
  3. Las 2 capas con sus responsabilidades, imports permitidos y prohibidos:

     Domain layer:
     - Reglas de negocio puras, sin dependencias externas
     - Contiene: entities, DTOs, states, enums, constantes
     - Allowed: nada externo al dominio del mismo modulo, tipos compartidos de @core/common/domain
     - Forbidden: infrastructure/*, React, Next.js, Zustand, Axios

     Infrastructure layer:
     - Capa tecnica: data access (HTTP), stores, services, helpers, UI
     - Contiene: data-access, store, services, helpers, ui (screens, components, hooks)
     - Allowed: domain/ del mismo modulo, @core/common, librerias externas
     - Forbidden: infrastructure/ de OTROS modulos

  4. Dependency direction: infrastructure -> domain (NUNCA al reves)
  5. Diferencias clave vs backend (NO hay application layer, NO hay UseCase/Interactor,
     NO hay ports/interfaces para DataAccess, stores llaman DataAccess directamente)

  Incluir diagrama ASCII o descripcion del flujo:
  Component -> Store -> DataAccess -> API

files_to_modify:
  - plugins/nextjs-development/agents/frontend-nextjs.md

patterns:
  - two_layer: domain (puro) + infrastructure (tecnico) con dependency direction estricta
  - layer_boundaries: imports permitidos y prohibidos por capa
  - enforcement: eslint-plugin-hexagonal-architecture en error level
  - no_application_layer: stores llaman DataAccess directamente, sin Ploc ni UseCase
  - data_flow: Component -> Store -> DataAccess -> API

acceptance:
