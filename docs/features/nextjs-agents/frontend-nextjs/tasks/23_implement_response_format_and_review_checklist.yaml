assigned_subagent: nextjs-development:frontend-nextjs

scope: |
  Agregar las secciones de Response Format y Code Review Checklist al agente frontend-nextjs.md.
  Estas secciones definen como el agente debe presentar sus respuestas y que criterios
  de calidad debe verificar antes de entregar codigo.

  1. Response Format (similar al backend-py.md):
     Cuando el agente implementa features, SIEMPRE debe:
     - Analizar implementaciones similares existentes primero
     - Explicar las decisiones arquitectonicas
     - Mostrar la implementacion completa por cada capa
     - Incluir manejo de errores con Either monad y fold()
     - Proveer ejemplos de tests
     - Documentar desviaciones de patrones estandar (si las hay)
     - Mantener implementaciones pragmaticas (sin over-engineering)

  2. Code Review Checklist (adaptado del backend-py.md para Next.js):
     - [ ] Sigue Two-layer Architecture (domain + infrastructure)
     - [ ] Dependency direction correcta (infrastructure -> domain)
     - [ ] TypeScript strict sin 'any'
     - [ ] Discriminated unions con campo 'kind' para estados
     - [ ] DataAccess usa handleRequest<T>() y retorna Either
     - [ ] Stores divididos por concern (~60-100 lineas)
     - [ ] response.fold() directo en acciones de stores
     - [ ] NO application layer, NO UseCase, NO Ploc
     - [ ] Texto visible via useTranslations() (no hardcoded)
     - [ ] Props con interface (no type alias)
     - [ ] Selectores especificos al consumir stores
     - [ ] Estilos con Tailwind + cn() (no CSS custom innecesario)
     - [ ] Tests con Vitest (domain, stores, UI criticos)
     - [ ] Traducciones en AMBOS archivos (es.json, en.json)
     - [ ] eslint-plugin-hexagonal-architecture sin violaciones
     - [ ] Sin over-engineering (no abstracciones innecesarias)

  3. Mission statement final del agente (como cierre del prompt):
     - Respetar los patrones establecidos
     - Priorizar pragmatismo sobre perfeccion teorica
     - Analizar antes de implementar
     - Consistencia con el codebase existente

