# technical.yaml
feature: frontend_nextjs_code_review
layer: agent  # Plugin-based agent system

architecture:
  pattern: Prompt-driven Agent (Plugin System)
  entry: Task tool with subagent_type "nextjs-development:reviewer-frontend-nextjs"
  agent_definition: plugins/nextjs-development/agents/reviewer-frontend-nextjs.md
  model: sonnet
  tools_access: All tools

agent_contract:
  invocation: Task tool subagent_type "nextjs-development:reviewer-frontend-nextjs"
  model: sonnet
  tools: [Read, Glob, Grep, Bash]
  inputs:
    pull_request: URL del Pull Request o diff de los cambios
    pr_title: titulo del PR
    pr_description: descripcion del PR con contexto del cambio
    changed_files: archivos modificados con lineas agregadas y eliminadas
    project_codebase: codigo fuente del proyecto para contexto (opcional)
  success_output:
    type: reporte de revision en markdown
    format: seccionado con puntajes, hallazgos y decision
    decision: enum[APPROVE, REQUEST_CHANGES, COMMENT]
  output_sections:
    - overall_assessment: decision, tipo de cambio, nivel de riesgo, tiempo estimado
    - architecture_score: puntaje X/10 con fortalezas, problemas y recomendaciones
    - code_quality_score: puntaje X/10 con fortalezas, problemas y recomendaciones
    - testing_score: puntaje X/10 con cobertura, fortalezas y tests faltantes
    - security_findings: hallazgos de seguridad clasificados por severidad
    - performance_findings: hallazgos de rendimiento
    - action_items: must fix (blocking), should fix (high priority), consider (nice to have)
    - decision: APPROVE o REQUEST_CHANGES con justificacion

# =============================================================================
# REVIEW SCOPE
# =============================================================================
review_scope:
  description: >
    Agente especializado en code review de Pull Requests de proyectos frontend
    Next.js bajo Clean Architecture / Hexagonal Architecture. Evalua calidad
    arquitectonica, calidad de codigo TypeScript/React y estrategia de testing
    segun los estandares definidos para proyectos Next.js del equipo.
  dimensions:
    architecture:
      weight: 30%
      scope:
        - Cumplimiento de Clean Architecture / Hexagonal Architecture
        - Principios SOLID adaptados a frontend TypeScript/React
        - Patrones de diseno esperados (Either, Ploc, Zustand, Factory DI)
        - Separacion de capas y direccion de dependencias
        - Estructura de modulos por feature
        - Identificacion de deuda tecnica
    code_quality:
      weight: 40%
      scope:
        - TypeScript strict mode y buenas practicas
        - Patrones de componentes React y hooks
        - Manejo de errores con Either monad
        - Vulnerabilidades de seguridad
        - Consideraciones de rendimiento
        - Mantenibilidad del codigo
    testing:
      weight: 30%
      scope:
        - Cobertura de tests para codigo nuevo
        - Calidad y completitud de tests
        - Buenas practicas de testing con Jest + Testing Library
        - Cobertura de edge cases
        - Patron de tests colocados junto al archivo fuente

# =============================================================================
# OUT OF SCOPE RULE
# =============================================================================
out_of_scope_rule:
  description: |
    Cuando NINGUN archivo modificado en el PR pertenece al alcance de revision
    tecnica del agente, no se ejecuta el pipeline de revision. En su lugar,
    el agente genera un comentario informativo en ingles en la PR y emite APPROVE
    automaticamente para no bloquear el merge.
  reviewable_paths:
    - "src/core/**/*.ts"
    - "src/core/**/*.tsx"
    - "src/ui/**/*.tsx"
    - "src/ui/**/*.ts"
    - "src/app/**/*.tsx"
    - "src/app/**/*.ts"
    - "src/components/**/*.tsx"
    - "src/components/**/*.ts"
  non_reviewable_examples:
    - archivos de configuracion (.yml, .yaml, .json excepto i18n, .config.js, .config.ts)
    - documentacion (.md, .rst, .txt)
    - archivos estaticos (imagenes, SVG, fuentes)
    - archivos de CI/CD (.github/workflows/)
    - archivos de infraestructura (Dockerfile, docker-compose, k8s manifests)
    - archivos de dependencias (package.json, package-lock.json, yarn.lock)
    - archivos de configuracion raiz (next.config.js, tailwind.config.js, tsconfig.json, jest.config.ts)
    - archivos de estilos globales (globals.css)
    - archivos de i18n (src/messages/*.json)
    - archivos publicos (public/*)
  detection: |
    En step_0 (pre-pipeline), filtrar archivos modificados contra reviewable_paths.
    Si la interseccion es vacia, activar flujo out_of_scope en lugar del pipeline normal.
  response:
    language: English
    action: post comment on PR via gh CLI
    decision: APPROVE
    comment_template: |
      ## Code Review - Out of Scope

      **Decision: APPROVE**

      The modified files in this PR are outside the scope of the technical code review.
      This review focuses on Next.js/TypeScript source code (`src/core/`, `src/ui/`,
      `src/app/`, `src/components/`), and none of the changed files fall within
      these directories.

      **Changed files:**
      {list_of_changed_files}

      No architectural, code quality, or testing analysis is required for these changes.
      Approving to unblock the merge process.

      ---
      *Automated review by Frontend Next.js Code Reviewer Agent*

# =============================================================================
# REVIEW PIPELINE
# =============================================================================
pipeline:
  step_0_scope_check:
    input: lista de archivos modificados en el PR
    process: |
      Filtrar archivos modificados contra las rutas revisables (src/core/**/*.ts(x),
      src/ui/**/*.ts(x), src/app/**/*.ts(x), src/components/**/*.ts(x)).
      Si NINGUN archivo modificado esta dentro del alcance de revision, generar
      comentario informativo en ingles en la PR indicando que los archivos estan
      fuera del scope tecnico, emitir APPROVE y terminar sin ejecutar el pipeline completo.
    output_in_scope: continuar a step_1_initial_analysis
    output_out_of_scope: comentario en PR + APPROVE automatico + fin del pipeline

  step_1_initial_analysis:
    input: Pull Request (titulo, descripcion, archivos modificados dentro del scope)
    process: |
      Leer titulo y descripcion del PR. Identificar tipo de cambio
      (feature, bug fix, refactoring, documentacion, configuracion, tests).
      Determinar estrategia de testing segun tipo de cambio y capa afectada.
      Evaluar alcance (archivos, lineas, complejidad).
    output: contexto del PR con tipo de cambio y estrategia de testing
    change_types:
      - new_feature: nuevo modulo/feature completo
      - bug_fix: correccion de errores
      - refactoring: reestructuracion sin cambio funcional
      - ui_update: cambios visuales en componentes
      - tests_only: solo tests nuevos o actualizados
      - configuration: cambios de configuracion

  step_2_architecture_review:
    input: archivos modificados + codebase del proyecto
    process: |
      Validar cumplimiento de Clean Architecture / Hexagonal Architecture
      (separacion de capas, direccion de dependencias). Verificar principios
      SOLID adaptados a frontend. Detectar patrones de diseno apropiados e
      inapropiados. Identificar violaciones de capa (domain importando de
      infrastructure, component importando directamente de otro modulo infrastructure).
    output: analisis arquitectonico con puntaje y hallazgos
    checks:
      - domain_layer_purity: domain no importa de infrastructure, application (otros modulos), React, Next.js, Zustand, Axios
      - application_layer_purity: application no importa de infrastructure, React, Next.js, Zustand, Axios
      - dependency_direction: infrastructure -> application -> domain (nunca al reves)
      - module_boundaries: no importar infrastructure/ de otros modulos (usar domain ports)
      - module_structure: estructura estandar domain/application/infrastructure por feature
      - port_implementation: servicios implementan interfaces del dominio
      - factory_di: dependencias ensambladas en {Module}Dependencies.ts con factory functions

  step_3_code_quality_review:
    input: archivos modificados
    process: |
      Verificar cumplimiento de TypeScript strict mode, uso correcto de tipos
      (sin 'any', discriminated unions, Either monad). Evaluar patrones de
      componentes React, hooks custom, stores Zustand. Detectar vulnerabilidades
      de seguridad. Identificar problemas de rendimiento. Verificar convenciones
      de nombres y organizacion de imports. Detectar code smells.
    output: analisis de calidad con puntaje y hallazgos

    typescript_checks:
      strict_mode:
        - no_any_type: "no usar 'any', preferir 'unknown' con type guards"
        - discriminated_unions: "estados con campo 'kind' como discriminador"
        - proper_generics: "genericos para utilidades reutilizables (Either<E,A>, handleRequest<T>)"
        - string_enums: "enums para valores de dominio"
        - type_inference: "inferir tipos de Zod schemas con z.infer<typeof schema>"
      either_pattern:
        - services_never_throw: "servicios retornan Either<ServiceError, ServiceSuccess<T>>, nunca lanzan excepciones"
        - handle_request_wrapper: "handleRequest<T>() envuelve todas las llamadas HTTP"
        - fold_for_branching: "fold() para manejar ambos caminos (error/success)"
        - service_error_structure: "ServiceError incluye: code, message, description"
      state_management:
        - discriminated_union_states: "estados con Loading/Loaded/Error usando campo 'kind'"
        - kind_constants: "constantes LOADING_KIND, LOADED_KIND, ERROR_KIND en vez de magic strings"
        - state_check_before_access: "verificar state.kind antes de acceder a datos"

    component_checks:
      - use_client_directive: "'use client' SOLO cuando el componente usa hooks, eventos o estado"
      - props_interface: "props definidas con interface (no type alias)"
      - i18n_compliance: "texto visible SIEMPRE via useTranslations() (nunca hardcoded)"
      - store_selectors: "estado del store via selectores especificos (no desestructurar todo)"
      - tailwind_classes: "estilos con Tailwind, cn() para condicionales (no template literals)"
      - page_as_wrapper: "paginas App Router son wrappers minimos que importan Screen components"
      - no_business_logic_in_pages: "logica de negocio fuera de src/app/ pages"

    hook_checks:
      - use_prefix: "prefijo 'use' obligatorio"
      - proper_location: "hooks en infrastructure/ui/hooks/"
      - use_memo_for_expensive: "useMemo solo para computaciones costosas"
      - use_callback_for_passed_handlers: "useCallback solo cuando handler se pasa como prop a componente memoizado"
      - use_ref_for_init_flags: "useRef para flags de inicializacion"
      - return_object: "retornar objeto (no array) para mejor legibilidad"

    store_checks:
      - one_store_per_module: "un Zustand store por modulo/feature"
      - separate_state_actions_interfaces: "State y Actions en interfaces separadas"
      - actions_call_ploc: "acciones llaman al Ploc (nunca servicios directamente)"
      - immutable_set: "set() para actualizar estado"
      - specific_selectors: "consumir con selectores: useStore((s) => ({ field: s.field }))"
      - no_business_logic: "no poner logica de negocio en el store"

    ploc_checks:
      - one_per_module: "un Ploc por modulo/feature"
      - receives_di: "recibe use cases y servicios via constructor (DI)"
      - transforms_either_to_state: "transforma Either<Error, Success> a discriminated union states"
      - no_react_hooks: "NO contiene logica de UI (sin React hooks)"
      - no_direct_api: "NO accede directamente a APIs (usa servicios)"

    service_checks:
      - implements_domain_port: "siempre implementa una interface del dominio (port)"
      - uses_handle_request: "usa handleRequest<T>() para envolver llamadas HTTP"
      - paths_as_functions: "paths como funciones que construyen URLs"
      - base_url_injected: "baseApiUrl inyectado via constructor"
      - uses_api_auth: "usa apiAuth (axios con interceptor Bearer token)"

    naming_conventions:
      files:
        components: "PascalCase.tsx"
        hooks: "camelCase.ts con prefijo use"
        services: "PascalCase.ts"
        stores: "PascalCase.ts"
        plocs: "PascalCase.ts"
        types: "PascalCase.ts"
        interfaces: "PascalCase.ts con prefijo 'i' (iDriversService.ts)"
        dtos: "PascalCase.ts"
        tests: "PascalCase.test.ts(x) colocado junto al archivo fuente"
        use_cases: "PascalCase.ts"
        commands: "PascalCase.ts"
        dependencies: "PascalCase.ts ({Module}Dependencies.ts)"
      variables:
        components: "PascalCase"
        hooks: "camelCase con prefijo 'use'"
        constants: "UPPER_SNAKE_CASE"
        types: "PascalCase"
        interfaces: "PascalCase con prefijo 'i'"
        stores: "camelCase con prefijo 'use'"
        functions: "camelCase"
        private_fields: "camelCase (no usar prefijo _)"

    import_order:
      - "React / Next.js imports"
      - "Third-party libraries"
      - "Path alias imports (@core/*, @ui/*, @components/*)"
      - "Relative imports"
      - "Type imports (import type { })"

    path_aliases:
      "~/*": "./src/*"
      "@ui/*": "./src/ui/*"
      "@components/*": "./src/components/*"
      "@core/*": "./src/core/*"
      "public/*": "./public/*"

    security_checks:
      - no_hardcoded_secrets: "no API keys, tokens o passwords en codigo"
      - xss_prevention: "no usar dangerouslySetInnerHTML sin sanitizacion"
      - input_validation: "validacion con Zod en formularios"
      - no_sensitive_data_in_client: "no exponer datos sensibles en client components"
      - env_variables: "secretos en variables de entorno (NEXT_PUBLIC_ solo para datos publicos)"
      - no_eval: "nunca usar eval() o Function() con strings dinamicos"

    performance_checks:
      - no_premature_memoization: "no usar React.memo, useMemo, useCallback sin medir performance"
      - dynamic_imports: "dynamic() import para componentes pesados (maps, charts)"
      - server_side_pagination: "paginacion server-side para listas grandes"
      - debounce_search: "debounce en campos de busqueda (300ms)"
      - next_image: "usar next/image para optimizacion de imagenes"
      - no_full_data_load: "no cargar todos los datos de una vez"
      - cancel_previous_requests: "cancelar requests anteriores al cambiar filtros"
      - lazy_load_modals: "lazy load modals y sidebars que no son visibles inicialmente"

    code_smells:
      - any_type: "usar unknown y type guards en vez de any"
      - magic_strings: "usar constantes o enums"
      - hardcoded_text: "usar useTranslations()"
      - direct_api_in_components: "usar store -> ploc -> service"
      - business_logic_in_components: "extraer a hooks o application layer"
      - mutating_state_directly: "usar set() de Zustand (inmutable)"
      - cross_module_infrastructure_import: "importar de infrastructure de otros modulos (usar domain ports)"
      - console_log_in_production: "usar logger service"
      - nested_ternaries: "extraer a funciones o early returns"
      - long_components: ">200 lineas (extraer sub-componentes o hooks)"
      - too_many_props: ">7 props (considerar composicion o context)"
      - commented_out_code: "codigo comentado sin proposito"

  step_4_testing_review:
    input: archivos de test + archivos modificados
    process: |
      Verificar que los tests estan colocados junto al archivo fuente
      ({File}.test.ts(x)). Evaluar calidad de tests por capa
      (domain, application, infrastructure, UI). Verificar patrones
      de mock correctos. Evaluar cobertura de edge cases.
    output: analisis de testing con puntaje y hallazgos

    test_location:
      pattern: "colocado junto al archivo fuente"
      example: "GetDriversUseCase.ts -> GetDriversUseCase.test.ts"
      rule: "NO usar directorio tests/ separado"

    testing_by_layer:
      domain_tests:
        what_to_test:
          - "funciones de transformacion de datos"
          - "validaciones de negocio"
          - "operaciones Either monad"
          - "utilidades del dominio"
        rules:
          - "sin mocks (logica pura)"
          - "cubrir casos edge (null, undefined, arrays vacios)"
          - "testar ambos caminos de Either (left/right)"
        coverage_target: "90%+"

      application_tests:
        what_to_test:
          - "use cases con diferentes respuestas del servicio"
          - "commands con transiciones de estado"
          - "validaciones de aplicacion"
        rules:
          - "mockear servicios con jest.Mocked<Interface>"
          - "testar caso exitoso Y caso de error"
          - "verificar que el servicio fue llamado con params correctos"
          - "beforeEach para resetear mocks"
        coverage_target: "80%+"

      infrastructure_tests:
        ploc_tests:
          what_to_test:
            - "transformacion de Either a State"
            - "transiciones de estado (loading -> loaded -> error)"
            - "integracion con use cases"
          rules:
            - "mockear servicios via factory"
            - "verificar kind del state resultante"
          coverage_target: "70%+"
        service_tests:
          what_to_test:
            - "construccion correcta de URLs"
            - "manejo de errores HTTP"
            - "transformacion de respuestas"
          coverage_target: "60%+"

      ui_tests:
        what_to_test:
          - "renderizado correcto con datos"
          - "estados de loading, error, empty"
          - "interacciones del usuario (click, input)"
          - "texto visible (traducido)"
        rules:
          - "usar render custom de test-utils (incluye NextIntlProvider)"
          - "mockear next/navigation cuando se usen hooks de router"
          - "buscar por rol, texto o test-id (no por clase CSS)"
          - "testar comportamiento visible, no implementacion interna"
          - "usar screen.getByText, screen.getByRole"
        coverage_target: "50%+ (componentes criticos)"

    mock_patterns:
      factory_pattern: "usar factories (fishery o manual) para generar datos de test consistentes"
      service_mock_factory: "mockGetServiceFactory para mockear servicios completos con Either"
      custom_mocks:
        - "LocalStorageMock: simula localStorage en jsdom"
        - "MockStorageService: wrapper de storage para tests"
        - "MockWebSocketFactory: simula conexiones WebSocket"
        - "StateMockFactory: wrapper de estado para Ploc tests"
      next_navigation_mock: |
        jest.mock('next/navigation', () => ({
          ...jest.requireActual('next/navigation'),
          useParams: () => ({ locale: 'es' }),
        }))

  step_5_generate_review:
    input: analisis de todos los pasos anteriores
    process: |
      Consolidar hallazgos en reporte estructurado con puntajes por
      dimension en encabezados de seccion. Clasificar action items
      por prioridad. Emitir decision final con justificacion.
    output: reporte de revision completo en markdown

# =============================================================================
# REVIEW DIMENSIONS (detailed criteria)
# =============================================================================
review_dimensions:
  architecture:
    weight: 30%
    scope:
      clean_architecture:
        layers: [domain, application, infrastructure]
        dependency_rule: "infrastructure -> application -> domain (nunca al reves)"
        domain_purity: "domain layer libre de imports de infrastructure, React, Next.js, Zustand, Axios"
        application_purity: "application layer libre de imports de infrastructure, React, Next.js, Zustand, Axios"
        module_structure: |
          src/core/{module-name}/
          ├── domain/           # tipos, interfaces (ports), DTOs, modelos
          ├── application/      # use cases, commands, validaciones
          └── infrastructure/   # services, plocs, stores, dependencies, ui/
      solid_principles:
        single_responsibility: "un componente/clase/modulo = una responsabilidad"
        dependency_inversion: "depender de abstracciones (interfaces i{Service}), no de implementaciones concretas"
        open_closed: "extensible via interfaces y composicion, no modificacion"
        interface_segregation: "interfaces especificas por necesidad (no fat interfaces)"
      design_patterns:
        expected:
          - "Either Monad: manejo funcional de errores en servicios"
          - "Ploc: Presentation Logic Orchestrator (transforma Either a State)"
          - "Zustand Store: estado global reactivo por modulo"
          - "Factory DI: factory functions en {Module}Dependencies.ts"
          - "Discriminated Unions: estados UI con campo 'kind'"
          - "Port/Adapter: interfaces de dominio con implementaciones de infrastructure"
        red_flags:
          - "God Component: componente con demasiada logica y responsabilidades"
          - "Direct API in Component: componente llamando APIs sin pasar por store/ploc/service"
          - "Cross-module Infrastructure Import: importar de infrastructure/ de otro modulo"
          - "Circular Dependencies: dependencias circulares entre modulos"
          - "Prop Drilling Excesivo: pasar props a traves de muchos niveles (usar store o context)"
          - "DI Framework: uso de InversifyJS, tsyringe u otros frameworks de DI"

  code_quality:
    weight: 40%
    scope:
      typescript_strictness: "TypeScript strict mode, sin any, discriminated unions, Either pattern"
      component_patterns: "componentes funcionales, props con interface, use client solo cuando necesario"
      hook_patterns: "hooks con prefijo use, retornan objetos, useMemo/useCallback solo cuando justificado"
      store_patterns: "Zustand con interfaces separadas, acciones via Ploc, selectores especificos"
      error_handling: "Either monad en servicios, fold() para branching, sin try/catch en servicios para errores de API"
      security: "sin secretos hardcoded, sin XSS, validacion con Zod, no exponer datos sensibles en client"
      performance: "sin memoizacion prematura, dynamic imports, paginacion server-side, debounce"
      i18n: "todo texto visible via useTranslations(), claves organizadas por feature"
      formatting: "semicolons false, single quotes, indent 2, Prettier"

  testing:
    weight: 30%
    scope:
      location: "tests colocados junto al archivo fuente ({File}.test.ts(x))"
      coverage_targets:
        domain: "90%+"
        application: "80%+"
        infrastructure_ploc: "70%+"
        infrastructure_services: "60%+"
        ui_components: "50%+ (componentes criticos)"
      mock_patterns: "jest.Mocked<Interface>, mockGetServiceFactory, factories para datos"
      test_quality: "testar comportamiento visible, no implementacion interna"

# =============================================================================
# TESTING STRATEGY
# =============================================================================
testing_strategy:
  description: |
    La estrategia de testing se adapta a la capa afectada por los cambios.
    Los tests SIEMPRE estan colocados junto al archivo fuente, no en
    directorio separado.
  domain_changes:
    detection: archivos en src/core/*/domain/
    required: tests unitarios puros sin mocks
    location: "{File}.test.ts junto al archivo fuente"
    coverage: "90%+"
  application_changes:
    detection: archivos en src/core/*/application/
    required: tests con servicios mockeados (jest.Mocked<Interface>)
    location: "{File}.test.ts junto al archivo fuente"
    coverage: "80%+"
  infrastructure_changes:
    detection: archivos en src/core/*/infrastructure/
    required: tests de plocs y servicios con mocks
    location: "{File}.test.ts(x) junto al archivo fuente"
    coverage: "60-70%+"
  ui_changes:
    detection: archivos en src/ui/**/*.tsx o src/app/**/*.tsx
    required: tests de componentes con React Testing Library
    location: "{File}.test.tsx junto al archivo fuente"
    coverage: "50%+ para componentes criticos"
    not_required: "100% de cobertura en UI, testar comportamiento critico"

# =============================================================================
# SCORE RULES
# =============================================================================
score_rules:
  authoritative_source: "puntajes en encabezados de seccion (### Architecture (Score: X/10))"
  consistency: "puntaje debe reflejar el analisis de la seccion"
  automated_extraction: "sistemas automatizados extraen puntajes de los encabezados"
  prohibited: "no agregar resumenes de metricas, tablas de puntajes ni secciones colapsables adicionales"

# =============================================================================
# ANTI-PATTERNS (Reviewer behavior)
# =============================================================================
anti_patterns:
  reviewer_must_not:
    - "solicitar abstracciones innecesarias (no Abstract Base Classes a menos que 3+ clases la extiendan)"
    - "solicitar Generic CRUD Abstractions prematuras (no BaseCrudService<T>)"
    - "solicitar deep inheritance hierarchies (maximo 1 nivel)"
    - "solicitar over-abstracting Ploc layer (no BasePloc<State, Actions>)"
    - "solicitar unnecessary middleware layers"
    - "solicitar DI frameworks (InversifyJS, tsyringe) — usar factory functions"
    - "solicitar premature optimization (React.memo, useMemo, useCallback sin medir)"
    - "solicitar over-testing de implementation details (no testar que useState fue llamado)"
    - "pedir future-proofing sin justificacion"
    - "demandar mas tests que los definidos en la estrategia por capa"
    - "sugerir refactoring de codigo funcional que no viola principios establecidos"
    - "solicitar capas o patrones adicionales mas alla de la cadena Component -> Store -> Ploc -> UseCase -> Service"
  reviewer_must:
    - "enfocarse en cumplimiento de Clean Architecture / Hexagonal Architecture definida"
    - "reportar bugs reales y vulnerabilidades de seguridad"
    - "verificar tests segun estrategia por capa (domain 90%+, application 80%+, etc.)"
    - "evaluar solo contra criterios de calidad establecidos"
    - "verificar Either pattern en servicios (no try/catch para errores de API)"
    - "verificar discriminated unions con campo 'kind' para estados"
    - "verificar i18n (texto visible via useTranslations, nunca hardcoded)"
    - "verificar que imports respetan boundaries de capas y modulos"
    - "ser constructivo, especifico, educativo, balanceado, respetuoso y pragmatico"

# =============================================================================
# APPROVAL CHECKLIST
# =============================================================================
approval_checklist:
  architecture:
    - "no layer violations (domain libre de imports de infrastructure/React/Next.js)"
    - "dependency direction respected (infrastructure -> application -> domain)"
    - "module boundaries respected (no cross-module infrastructure imports)"
    - "SOLID principles respected"
    - "expected patterns used (Either, Ploc, Zustand, Factory DI, Discriminated Unions)"
    - "no circular dependencies"
    - "clear separation of concerns"
  code_quality:
    - "TypeScript strict mode compliance (no any)"
    - "Either pattern in services (no try/catch for API errors)"
    - "discriminated unions with 'kind' field for states"
    - "no critical security vulnerabilities (no hardcoded secrets, no XSS)"
    - "proper component patterns (use client only when needed, props with interface)"
    - "i18n compliance (visible text via useTranslations)"
    - "no obvious performance issues"
    - "code is readable and maintainable"
    - "naming conventions followed"
    - "import order respected"
  testing:
    - "tests colocated with source files ({File}.test.ts(x))"
    - "coverage targets met per layer"
    - "mock patterns correct (jest.Mocked<Interface>, factories)"
    - "edge cases covered"
    - "tests verify behavior, not implementation details"
  forms:
    - "Zod schema for validation"
    - "zodResolver integration with React Hook Form"
    - "types inferred from schema (z.infer)"

# =============================================================================
# OUTPUT FORMAT
# =============================================================================
output_format:
  template: |
    ## Code Review Summary

    **Overall Assessment**: [APPROVE | REQUEST_CHANGES | COMMENT]

    **Change Type**: [Feature | Bug Fix | Refactoring | UI Update | Tests Only | etc.]
    **Risk Level**: [Low | Medium | High]
    **Estimated Review Time**: [X minutes]

    ---

    ### Architecture (Score: X/10)

    [Analysis of architectural decisions]

    **Strengths**:
    - [Point 1]
    - [Point 2]

    **Issues Found**:
    - [Critical issue] - [Explanation and suggestion]
    - [Warning] - [Explanation]

    **Recommendations**:
    - [Specific actionable recommendation]

    ---

    ### Code Quality (Score: X/10)

    [Analysis of code quality]

    **Strengths**:
    - [Point 1]

    **Issues Found**:
    - [Issue] at `File.tsx:123`
    - [Warning] at `File.ts:456`

    **Recommendations**:
    - [Specific actionable recommendation]

    ---

    ### Testing (Score: X/10)

    [Analysis of test coverage and quality]

    **Coverage**: [X%]

    **Strengths**:
    - [Point 1]

    **Missing Tests**:
    - [What needs testing]

    **Recommendations**:
    - Add domain tests for `transformFunction` in `Entity.ts`
    - Add application tests for `{Action}UseCase` with success and error paths

    ---

    ### Security

    **Findings**:
    - [None | List of security issues]

    ---

    ### Performance

    **Findings**:
    - [None | List of performance concerns]

    ---

    ### Action Items

    **Must Fix (Blocking Merge)**:
    1. [Critical item]

    **Should Fix (High Priority)**:
    1. [Important item]

    **Consider (Nice to Have)**:
    1. [Suggestion]

    ---

    ### Decision

    **[APPROVE | REQUEST CHANGES]**

    **Justification**: [Explain why approving or requesting changes]

    **IMPORTANT**: Do NOT add metrics summaries, score tables, or collapsible
    sections at the end. The GitHub Actions workflow will automatically generate
    these from your section header scores.

# =============================================================================
# TONE AND COMMUNICATION
# =============================================================================
tone_and_communication:
  principles:
    - "Be Constructive: Focus on solutions, not just problems"
    - "Be Specific: Reference exact files and line numbers"
    - "Be Educational: Explain WHY something is an issue"
    - "Be Balanced: Acknowledge good practices too"
    - "Be Respectful: Remember there's a human behind the code"
    - "Be Pragmatic: Respect the established quality criteria and avoid over-engineering suggestions"
  language: English
  good_examples:
    - "Great use of the Either pattern here! The fold() makes error handling very explicit."
    - "Consider extracting this logic into a custom hook to keep the component focused on rendering."
    - "This Ploc correctly transforms the Either response into discriminated union states. Clean implementation."
  bad_examples:
    - "This code is bad. (Not specific or helpful)"
    - "Why did you do it this way? (Sounds accusatory)"
    - "Just fix this. (No explanation or guidance)"

# =============================================================================
# REFERENCE TECHNOLOGY STACK
# =============================================================================
reference_stack:
  description: |
    Stack de referencia probado en produccion. El reviewer debe adaptar sus
    criterios a las versiones instaladas en el proyecto bajo revision,
    manteniendo los mismos patrones arquitectonicos.
  required:
    framework: "Next.js 13+ (App Router)"
    language: "TypeScript (strict mode)"
    runtime: "React 18+"
    state_management: "Zustand"
    styling: "Tailwind CSS"
    forms: "React Hook Form + Zod"
    http_client: "Axios"
    testing:
      framework: "Jest + ts-jest"
      component_testing: "@testing-library/react"
      environment: "jsdom"
  recommended:
    ui_library: "shadcn/ui (Radix UI primitives)"
    i18n: "next-intl"
    tables: "TanStack React Table"

# =============================================================================
# DEPENDENCIES
# =============================================================================
dependencies:
  - Read tool: leer archivos del PR y del proyecto para analisis
  - Glob tool: descubrir estructura del proyecto y patrones de archivos
  - Grep tool: buscar patrones, imports y dependencias en el codebase
  - Bash tool: ejecutar gh CLI para obtener informacion del PR, diff y comentarios
