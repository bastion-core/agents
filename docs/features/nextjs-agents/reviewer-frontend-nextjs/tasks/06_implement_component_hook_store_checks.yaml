scope: |
  Agregar la segunda parte del Step 3 (Code Quality Review) al agente
  reviewer-frontend-nextjs.md. Esta tarea cubre los checks de componentes
  React, hooks custom y stores Zustand del technical.yaml
  (secciones component_checks, hook_checks, store_checks del step_3).

  1. Component Checks (7 reglas):
     - use_client_directive: 'use client' SOLO cuando el componente usa hooks, eventos o estado
     - props_interface: props definidas con interface (no type alias)
     - i18n_compliance: texto visible SIEMPRE via useTranslations() (nunca hardcoded)
     - store_selectors: estado del store via selectores especificos
       (no desestructurar todo el store)
     - tailwind_classes: estilos con Tailwind, cn() para condicionales
       (no template literals para clases)
     - page_as_wrapper: paginas App Router son wrappers minimos que importan Screen components
     - no_business_logic_in_pages: logica de negocio fuera de src/app/ pages

  2. Hook Checks (6 reglas):
     - use_prefix: prefijo 'use' obligatorio
     - proper_location: hooks en infrastructure/ui/hooks/
     - use_memo_for_expensive: useMemo solo para computaciones costosas
     - use_callback_for_passed_handlers: useCallback solo cuando handler se pasa
       como prop a componente memoizado
     - use_ref_for_init_flags: useRef para flags de inicializacion
     - return_object: retornar objeto (no array) para mejor legibilidad

  3. Store Checks (10 reglas):
     - multiple_stores_per_module: multiples stores por modulo, divididos por concern
       (~60-100 lineas)
     - separate_state_actions_interfaces: State y Actions en interfaces separadas
       (en domain/states/)
     - actions_call_data_access: stores llaman DataAccess directamente
       (no Ploc ni UseCase)
     - fold_in_actions: response.fold() directo en las acciones del store
     - boolean_loading_flags: boolean loading flags (isLoadingList, isLoadingDetail, etc.)
     - immutable_set: set() para actualizar estado
     - specific_selectors: consumir con selectores: useStore((s) => ({ field: s.field }))
     - data_access_module_level: DataAccess instanciado fuera del store, a nivel de modulo
     - cross_store_communication: useOtherStore.getState().action() para comunicacion
       entre stores
     - no_fat_stores: evitar stores monoliticos de 500+ lineas

  Incluir ejemplos concretos de codigo correcto e incorrecto para cada grupo.

