assigned_subagent: nextjs-development:reviewer-frontend-nextjs

scope: |
  Agregar las secciones de Score Rules y Anti-Patterns (comportamiento del reviewer)
  al agente reviewer-frontend-nextjs.md. Cubrir las secciones score_rules y
  anti_patterns del technical.yaml.

  1. Score Rules:
     - Fuente autoritativa: puntajes en encabezados de seccion
       (### Architecture (Score: X/10))
     - Consistencia: puntaje debe reflejar el analisis de la seccion
     - Extraccion automatizada: sistemas automatizados extraen puntajes de encabezados
     - Prohibido: no agregar resumenes de metricas, tablas de puntajes ni
       secciones colapsables adicionales

  2. Anti-Patterns del Reviewer (reviewer_must_not - 14 prohibiciones):
     - No solicitar abstracciones innecesarias (no ABC a menos que 3+ clases la extiendan)
     - No solicitar Generic CRUD Abstractions prematuras (no BaseCrudService<T>)
     - No solicitar deep inheritance hierarchies (maximo 1 nivel)
     - No solicitar capa application/ con Ploc, UseCase, Command o Dependencies
     - No solicitar fat stores monoliticos (dividir por concern)
     - No solicitar unnecessary middleware layers
     - No solicitar DI frameworks (InversifyJS, tsyringe) — DataAccess a nivel de modulo
     - No solicitar premature optimization (React.memo, useMemo, useCallback sin medir)
     - No solicitar over-testing de implementation details
     - No pedir future-proofing sin justificacion
     - No demandar mas tests que los definidos en la estrategia por capa
     - No sugerir refactoring de codigo funcional que no viola principios establecidos
     - No solicitar capas adicionales mas alla de Component -> Store -> DataAccess
     - No solicitar interfaces en domain para DataAccess (son clases concretas, no ports)

  3. Reviewer Must (11 obligaciones):
     - Enfocarse en cumplimiento de arquitectura de dos capas
     - Reportar bugs reales y vulnerabilidades de seguridad
     - Verificar tests segun estrategia por capa
     - Evaluar solo contra criterios de calidad establecidos
     - Verificar Either pattern en DataAccess (no try/catch para errores de API)
     - Verificar response.fold() directo en stores (no Ploc intermediario)
     - Verificar discriminated unions con campo 'kind' para estados
     - Verificar i18n (texto visible via useTranslations, nunca hardcoded)
     - Verificar que imports respetan boundaries de capas y modulos
     - Verificar que stores son pequenos y focalizados (~60-100 lineas)
     - Ser constructivo, especifico, educativo, balanceado, respetuoso y pragmatico

  Esta seccion es CRITICA porque define los guardrails del reviewer para evitar
  que sea demasiado estricto o solicite over-engineering.

