# tasks/03_implement_review_pipeline_steps_0_1.yaml
task: implement_review_pipeline_steps_0_1
phase: 3 - Review Pipeline Setup
level: L2
parent: technical.yaml
status: PENDING
depends_on: [02_implement_out_of_scope_rule]
assigned_subagent: nextjs-development:reviewer-frontend-nextjs

scope: |
  Agregar los Steps 0 y 1 del pipeline de revision al agente reviewer-frontend-nextjs.md.
  Cubrir las secciones step_0_scope_check y step_1_initial_analysis del technical.yaml.

  Step 0 - Scope Check (Pre-Pipeline Gate):
  - Input: lista de archivos modificados en el PR
  - Proceso: filtrar archivos contra rutas revisables (src/core, src/ui, src/app, src/components)
  - Output in-scope: continuar a Step 1
  - Output out-of-scope: comentario en PR + APPROVE automatico + fin del pipeline
  - Referencia a la seccion out_of_scope_rule implementada en task 02

  Step 1 - Initial Analysis:
  - Input: PR (titulo, descripcion, archivos modificados dentro del scope)
  - Proceso:
    - Leer titulo y descripcion del PR
    - Identificar tipo de cambio (change_types del technical.yaml):
      * new_feature: nuevo modulo/feature completo
      * bug_fix: correccion de errores
      * refactoring: reestructuracion sin cambio funcional
      * ui_update: cambios visuales en componentes
      * tests_only: solo tests nuevos o actualizados
      * configuration: cambios de configuracion
    - Determinar estrategia de testing segun tipo de cambio y capa afectada
    - Evaluar alcance (archivos, lineas, complejidad)
  - Output: contexto del PR con tipo de cambio y estrategia de testing

  El Step 1 debe establecer el contexto que guia todos los pasos posteriores.
  La estrategia de testing se determina aqui y se aplica en Step 4.

files_to_modify:
  - plugins/nextjs-development/agents/reviewer-frontend-nextjs.md

patterns:
  - scope_check_gate: decision binaria in-scope vs out-of-scope
  - change_type_classification: 6 tipos de cambio con criterios de deteccion
  - testing_strategy_determination: la estrategia de testing se decide en Step 1
  - context_establishment: Step 1 establece contexto para Steps 2-5

acceptance:
  - prompt define Step 0 con logica de filtrado de archivos revisables
  - prompt conecta Step 0 con el flujo out-of-scope de task 02
  - prompt define Step 1 con clasificacion de tipos de cambio (6 tipos)
  - prompt indica que la estrategia de testing se determina en Step 1
  - prompt evalua alcance del PR (archivos, lineas, complejidad)
  - prompt establece que el output de Step 1 es input para Steps 2-5

context_files:
  - docs/features/nextjs-agents/reviewer-frontend-nextjs/technical.yaml  # pipeline.step_0, step_1
  - plugins/python-development/agents/reviewer-backend-py.md  # Step 0, Step 1
