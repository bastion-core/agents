# tasks/01_create_agent_foundation.yaml
task: create_agent_foundation
phase: 1 - Foundation
level: L2
parent: technical.yaml
status: PENDING
depends_on: []
assigned_subagent: nextjs-development:reviewer-frontend-nextjs

scope: |
  Crear el archivo base del agente reviewer-frontend-nextjs.md en
  plugins/nextjs-development/agents/. Incluir:

  1. Frontmatter YAML:
     - name: reviewer-frontend-nextjs
     - description: Code reviewer for Next.js frontend PRs with two-layer architecture,
       Zustand stores, and DataAccess pattern
     - model: sonnet
     - color: green (o el color que corresponda al plugin nextjs-development)

  2. Titulo y rol del agente:
     - Especialista en code review de PRs de proyectos frontend Next.js
     - Arquitectura de dos capas (domain + infrastructure, sin application/)
     - Zustand stores y DataAccess pattern
     - Evalua calidad arquitectonica, calidad de codigo TypeScript/React y testing

  3. Review Scope con las tres dimensiones y sus pesos:
     - Architecture & Design (30%): dos capas, SOLID, patrones esperados
     - Code Quality (40%): TypeScript strict, componentes React, Either monad, seguridad, rendimiento
     - Testing & Coverage (30%): Vitest + Testing Library, tests colocados, cobertura por capa

  4. Invocacion del agente:
     - Task tool con subagent_type "nextjs-development:reviewer-frontend-nextjs"
     - Tools: Read, Glob, Grep, Bash
     - Inputs: pull_request, pr_title, pr_description, changed_files, project_codebase (opcional)
     - Output: reporte markdown con puntajes, hallazgos y decision (APPROVE | REQUEST_CHANGES | COMMENT)

  Tomar como referencia la estructura de reviewer-backend-py.md para formato y tono.

files_to_create:
  - plugins/nextjs-development/agents/reviewer-frontend-nextjs.md

patterns:
  - frontmatter: name, description, model sonnet, color
  - agent_role: especialista code review Next.js con Two-layer Architecture
  - three_dimensions: architecture 30%, code quality 40%, testing 30%
  - invocation_contract: Task tool, inputs, outputs, tools

acceptance:
  - archivo reviewer-frontend-nextjs.md creado con frontmatter YAML valido
  - seccion de introduccion define rol como code reviewer especializado en Next.js
  - menciona arquitectura de dos capas (domain + infrastructure) como patron principal
  - menciona Zustand stores y DataAccess pattern
  - define las tres dimensiones de revision con pesos (30%, 40%, 30%)
  - lista tools disponibles (Read, Glob, Grep, Bash)
  - define inputs esperados (pull_request, pr_title, pr_description, changed_files)
  - define output esperado (reporte markdown con decision)
  - tono y formato consistentes con reviewer-backend-py.md

context_files:
  - docs/features/nextjs-agents/reviewer-frontend-nextjs/technical.yaml  # agent_contract, review_scope
  - plugins/python-development/agents/reviewer-backend-py.md  # referencia de formato y estructura
