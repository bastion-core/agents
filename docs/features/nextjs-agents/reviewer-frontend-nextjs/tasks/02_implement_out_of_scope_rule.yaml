# tasks/02_implement_out_of_scope_rule.yaml
task: implement_out_of_scope_rule
phase: 2 - Pre-Pipeline Gate
level: L2
parent: technical.yaml
status: PENDING
depends_on: [01_create_agent_foundation]
assigned_subagent: nextjs-development:reviewer-frontend-nextjs

scope: |
  Agregar la seccion de Out of Scope Rule al agente reviewer-frontend-nextjs.md.
  Cubrir la seccion out_of_scope_rule del technical.yaml que define el comportamiento
  cuando NINGUN archivo del PR esta dentro del alcance de revision tecnica.

  Incluir:

  1. Rutas revisables (reviewable_paths):
     - src/core/**/*.ts y src/core/**/*.tsx
     - src/ui/**/*.tsx y src/ui/**/*.ts
     - src/app/**/*.tsx y src/app/**/*.ts
     - src/components/**/*.tsx y src/components/**/*.ts

  2. Ejemplos de archivos NO revisables:
     - Archivos de configuracion (.yml, .yaml, .json excepto i18n, .config.js, .config.ts)
     - Documentacion (.md, .rst, .txt)
     - Archivos estaticos (imagenes, SVG, fuentes)
     - CI/CD (.github/workflows/)
     - Infraestructura (Dockerfile, docker-compose, k8s manifests)
     - Dependencias (package.json, package-lock.json, yarn.lock)
     - Config raiz (next.config.js, tailwind.config.js, tsconfig.json, vitest.config.ts)
     - Estilos globales (globals.css)
     - i18n (src/messages/*.json)
     - Archivos publicos (public/*)

  3. Deteccion: en step_0 filtrar archivos contra reviewable_paths.
     Si interseccion vacia, activar flujo out_of_scope.

  4. Respuesta out of scope (template exacto del technical.yaml):
     - Idioma: English
     - Accion: post comment on PR via gh CLI
     - Decision: APPROVE automatico
     - Template con seccion "Code Review - Out of Scope", lista de archivos cambiados,
       y nota de que no requiere analisis arquitectonico

  5. Reglas IMPORTANTES:
     - No incluir secciones de Architecture Score, Code Quality Score ni Testing Score
     - La decision siempre es APPROVE para out-of-scope
     - No ejecutar pasos posteriores del pipeline (Steps 1-5)

files_to_modify:
  - plugins/nextjs-development/agents/reviewer-frontend-nextjs.md

patterns:
  - reviewable_paths: lista de globs de archivos dentro del scope
  - non_reviewable_examples: lista de tipos de archivos excluidos
  - out_of_scope_template: template markdown exacto para respuesta
  - early_exit: flujo que termina sin ejecutar el pipeline completo

acceptance:
  - prompt define claramente las rutas revisables (src/core, src/ui, src/app, src/components)
  - prompt lista ejemplos de archivos NO revisables
  - prompt incluye template exacto de respuesta out of scope en ingles
  - prompt indica que la decision es siempre APPROVE para out-of-scope
  - prompt indica que NO se ejecutan los pasos 1-5 del pipeline
  - prompt indica que NO se incluyen secciones de score

context_files:
  - docs/features/nextjs-agents/reviewer-frontend-nextjs/technical.yaml  # out_of_scope_rule
  - plugins/python-development/agents/reviewer-backend-py.md  # Step 0: Scope Check
