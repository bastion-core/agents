scope: |
  Agregar Step 4 (Testing Review) al agente reviewer-frontend-nextjs.md.
  Cubrir las secciones step_4_testing_review y testing_strategy del technical.yaml.

  1. Test Location Pattern:
     - Tests colocados junto al archivo fuente ({File}.test.ts(x))
     - Ejemplo: DriversDataAccess.ts -> DriversDataAccess.test.ts
     - Regla: NO usar directorio tests/ separado

  2. Testing by Layer (4 capas con reglas y coverage target):

     a) Domain Tests:
        - Que testar: funciones de transformacion, validaciones, Either monad, utilidades
        - Reglas: sin mocks (logica pura), cubrir edge cases (null, undefined, arrays vacios),
          testar ambos caminos de Either (left/right)
        - Import: describe, it, expect from 'vitest'
        - Coverage target: 90%+

     b) Store Tests:
        - Que testar: acciones exitosas, errores, transiciones de loading, reset de estado
        - Reglas: mockear DataAccess con vi.mock(), testar caso exitoso Y error,
          verificar transiciones de loading state, beforeEach para resetear store,
          act() para envolver actualizaciones de estado
        - Import: describe, it, expect, vi, beforeEach from 'vitest'
        - Coverage target: 70%+

     c) Data Access Tests:
        - Que testar: construccion correcta de URLs, manejo de errores HTTP,
          transformacion de respuestas
        - Coverage target: 60%+

     d) UI Tests:
        - Que testar: renderizado con datos, estados loading/error/empty,
          interacciones de usuario, texto traducido
        - Reglas: render custom de test-utils (incluye NextIntlProvider),
          mockear next/navigation, buscar por rol/texto/test-id (no por clase CSS),
          testar comportamiento visible (no implementacion interna)
        - Import: describe, it, expect, vi from 'vitest'
        - Coverage target: 50%+ (componentes criticos)

  3. Mock Patterns:
     - factory_pattern: factories (fishery o manual) para datos de test
     - data_access_mock_factory: mockGetServiceFactory para mockear DataAccess con Either
     - Custom mocks: LocalStorageMock, MockStorageService, MockWebSocketFactory
     - next_navigation_mock: vi.mock('next/navigation') con useParams mockeado

  4. Testing Strategy by Change Type (del testing_strategy):
     - domain_changes: tests unitarios puros sin mocks, 90%+
     - store_changes: tests de acciones con DataAccess mockeado, 70%+
     - infrastructure_changes: tests con mocks, 60%+
     - ui_changes: tests con React Testing Library, 50%+ para criticos

  Incluir ejemplos concretos de tests por capa, mostrando imports de vitest,
  setup de mocks y assertions.

