# tasks/15_test_review_well_structured_pr.yaml
task: test_review_well_structured_pr
phase: 12 - Validation
level: L3
parent: technical.yaml
status: PENDING
depends_on: [14_implement_reference_stack_mission]
assigned_subagent: nextjs-development:reviewer-frontend-nextjs

scope: |
  Validar que el agente reviewer-frontend-nextjs.md genera un reporte correcto
  cuando se le presenta un PR bien estructurado que sigue todos los patrones
  esperados de la arquitectura de dos capas.

  Escenario de prueba:
  Simular un PR de tipo "new_feature" que incluye:
  - Domain layer: entities, dtos, states con discriminated unions y campo 'kind'
  - Infrastructure layer: DataAccess con handleRequest y Either return,
    Store con fold() directo, componentes con useTranslations
  - Tests colocados junto al archivo fuente para cada capa
  - Naming conventions correctas
  - Import order correcto
  - Sin code smells

  Verificaciones:
  1. El reporte sigue el output_format definido (8 secciones)
  2. Los puntajes estan en los encabezados de seccion (Score: X/10)
  3. Architecture score es alto (8+/10) para codigo que cumple dos capas
  4. Code Quality score es alto (8+/10) para codigo que sigue patrones
  5. Testing score refleja coverage targets cumplidos
  6. Security findings es "None" si no hay vulnerabilidades
  7. Performance findings es "None" si no hay issues
  8. Action items tiene pocos o ningun "Must Fix"
  9. Decision es APPROVE con justificacion
  10. No hay secciones extra ni tablas de puntajes al final
  11. El reviewer reconoce buenas practicas (Strengths no esta vacio)
  12. El tono es constructivo, especifico y balanceado

  El test valida que el reviewer:
  - No solicita over-engineering en codigo correcto
  - No pide capa application/ cuando no existe
  - No pide interfaces en domain para DataAccess
  - No pide DI frameworks
  - No pide memoizacion prematura
  - Reconoce y elogia buenas practicas

files_to_verify:
  - plugins/nextjs-development/agents/reviewer-frontend-nextjs.md

patterns:
  - positive_review: el reviewer reconoce y elogia buenas practicas
  - no_over_engineering: no solicita cambios innecesarios en codigo correcto
  - correct_output_format: reporte sigue el template exacto
  - approve_decision: PR bien estructurado recibe APPROVE

acceptance:
  - el agente genera reporte con las 8 secciones del output_format
  - puntajes estan en encabezados de seccion (no en tablas extra)
  - architecture score es 8+/10 para codigo que cumple dos capas
  - code quality score es 8+/10 para codigo que sigue patrones
  - decision es APPROVE para PR bien estructurado
  - el reviewer reconoce buenas practicas en seccion Strengths
  - el reviewer NO solicita over-engineering ni capas adicionales
  - el tono es constructivo y balanceado
  - no hay secciones extra al final del reporte

