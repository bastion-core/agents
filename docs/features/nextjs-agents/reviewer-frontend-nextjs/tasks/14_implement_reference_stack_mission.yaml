scope: |
  Agregar las secciones finales de Reference Technology Stack, Dependencies
  y Mission Statement al agente reviewer-frontend-nextjs.md. Cubrir las
  secciones reference_stack y dependencies del technical.yaml.

  1. Reference Technology Stack:
     - Descripcion: Stack de referencia probado en produccion. El reviewer debe
       adaptar sus criterios a las versiones instaladas en el proyecto bajo revision,
       manteniendo los mismos patrones arquitectonicos.

     Required:
     - Framework: Next.js 13+ (App Router)
     - Language: TypeScript (strict mode)
     - Runtime: React 18+
     - State Management: Zustand
     - Styling: Tailwind CSS v4
     - Forms: React Hook Form + Zod
     - HTTP Client: Axios
     - Testing:
       - Framework: Vitest
       - Component Testing: @testing-library/react
       - Environment: jsdom

     Recommended:
     - UI Library: shadcn/ui (Radix UI primitives)
     - i18n: next-intl
     - Tables: TanStack React Table

  2. Dependencies (tools del agente):
     - Read tool: leer archivos del PR y del proyecto para analisis
     - Glob tool: descubrir estructura del proyecto y patrones de archivos
     - Grep tool: buscar patrones, imports y dependencias en el codebase
     - Bash tool: ejecutar gh CLI para obtener informacion del PR, diff y comentarios

  3. Mission Statement (similar a reviewer-backend-py):
     - El reviewer es el gatekeeper de calidad del codigo frontend
     - Su review determina si el codigo es production-ready
     - Quality over speed
     - Prevention over correction
     - Education over gatekeeping
     - Collaboration over criticism
     - Pragmatic development: respetar criterios establecidos sin over-engineering
     - Goal: no solo encontrar problemas, sino ayudar al equipo a crecer

