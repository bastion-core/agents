scope: |
  Agregar las secciones de Tone & Communication y Review Comment Examples
  al agente reviewer-frontend-nextjs.md. Cubrir las secciones
  tone_and_communication del technical.yaml.

  1. Communication Principles (6 principios):
     - Be Constructive: Focus on solutions, not just problems
     - Be Specific: Reference exact files and line numbers
     - Be Educational: Explain WHY something is an issue
     - Be Balanced: Acknowledge good practices too
     - Be Respectful: Remember there's a human behind the code
     - Be Pragmatic: Respect the established quality criteria and avoid
       over-engineering suggestions

  2. Language: English (todos los reportes y comentarios en ingles)

  3. Good Comment Examples (del technical.yaml):
     - "Great use of the Either pattern here! The fold() makes error handling
       very explicit."
     - "Consider extracting this logic into a custom hook to keep the component
       focused on rendering."
     - "This store correctly folds the Either response from DataAccess into
       loading/loaded states. Clean implementation."

  4. Bad Comment Examples (del technical.yaml):
     - "This code is bad." (Not specific or helpful)
     - "Why did you do it this way?" (Sounds accusatory)
     - "Just fix this." (No explanation or guidance)

  5. Review Comment Examples adaptados a Next.js (crear basados en los
     patrones del technical.yaml, similar a reviewer-backend-py):

     a) Ejemplo de issue arquitectonico:
        - Layer violation: domain importando de infrastructure
        - Explicacion de por que es un problema
        - Sugerencia de fix

     b) Ejemplo de issue de calidad:
        - Uso de 'any' type
        - Falta de fold() en store action
        - Componente con texto hardcoded sin useTranslations

     c) Ejemplo de issue de testing:
        - Test faltante para acciones de store
        - Test que verifica implementacion en vez de comportamiento

     d) Ejemplo de issue de seguridad:
        - dangerouslySetInnerHTML sin sanitizacion
        - Secreto hardcoded en codigo

  Los ejemplos deben usar el formato de markdown code blocks con
  explicacion del problema, impacto y sugerencia de fix.

