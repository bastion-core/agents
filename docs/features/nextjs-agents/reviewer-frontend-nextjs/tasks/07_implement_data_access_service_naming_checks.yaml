scope: |
  Agregar la tercera parte del Step 3 (Code Quality Review) al agente
  reviewer-frontend-nextjs.md. Esta tarea cubre los checks de DataAccess,
  Services, Helpers, naming conventions, import order y path aliases del
  technical.yaml (secciones data_access_checks, service_checks, helpers_checks,
  naming_conventions, import_order, path_aliases del step_3).

  1. DataAccess Checks (5 reglas):
     - concrete_class: clase concreta, sin interface en domain (no es un port)
     - uses_handle_request: usa handleRequest<T>() para envolver llamadas HTTP
     - base_url_injected: baseApiUrl inyectado via constructor
     - uses_api_auth: usa apiAuth (axios con interceptor Bearer token)
     - original_method: originalMethod() para identificar el origen en logs de error

  2. Service Checks (3 reglas):
     - only_for_real_logic: solo crear Service cuando hay logica real
       (no solo HTTP calls)
     - not_http_wrapper: si solo es fetch/post, usar DataAccess en su lugar
     - valid_example: ejemplo valido como DraftsService
       (localStorage + auto-save + parseo)

  3. Helpers Checks (4 reglas):
     - repeat_threshold: crear helper solo cuando el patron se repite 3+ veces
     - pure_functions: funciones puras (sin side effects)
     - proper_location: ubicar en infrastructure/helpers/
     - naming: nombrar en camelCase (normalizeResponse.ts)

  4. Naming Conventions:
     - Files: PascalCase.tsx (componentes), camelCase.ts (hooks con prefijo use),
       PascalCase.ts (DataAccess, services, stores, types, dtos),
       camelCase.ts (helpers), PascalCase.test.ts(x) (tests)
     - Variables: PascalCase (componentes, tipos), camelCase (hooks con 'use',
       stores con 'use', funciones), UPPER_SNAKE_CASE (constantes),
       camelCase sin prefijo _ (campos privados)

  5. Import Order (5 niveles):
     - React / Next.js imports
     - Third-party libraries
     - Path alias imports (@core/*, @ui/*, @components/*)
     - Relative imports
     - Type imports (import type { })

  6. Path Aliases:
     - ~/*: ./src/*
     - @ui/*: ./src/ui/*
     - @components/*: ./src/components/*
     - @core/*: ./src/core/*
     - public/*: ./public/*

