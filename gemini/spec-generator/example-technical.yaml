  - alembic: Migraciones de base de datos para las nuevas tablas
  - pydantic: Validacion de DTOs de request y response
  - fastapi: Framework para endpoints REST con autenticacion y autorizacion
  - pytest: Testing de interactors con repositorios mockeados
